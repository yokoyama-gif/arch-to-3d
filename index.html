// === Audio (simple oscillator beeps) ===
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playSound(freq, dur, type, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "square";
  osc.frequency.value = freq;
  gain.gain.value = vol || 0.08;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sfxJump()   { playSound(440, 0.12, "square", 0.06); playSound(580, 0.08, "square", 0.04); }
function sfxKey()    { playSound(660, 0.1, "square", 0.06); playSound(880, 0.1, "square", 0.06); playSound(1100, 0.15, "square", 0.06); }
function sfxDoor()   { playSound(440, 0.15, "square", 0.05); playSound(550, 0.15, "square", 0.05); playSound(660, 0.2, "square", 0.05); playSound(880, 0.25, "square", 0.05); }
function sfxHit()    { playSound(120, 0.3, "sawtooth", 0.08); }
function sfxAttack() { playSound(300, 0.08, "square", 0.05); playSound(200, 0.06, "noise", 0.03); }
function sfxDeath()  { playSound(200, 0.15, "square", 0.07); playSound(150, 0.15, "square", 0.07); playSound(100, 0.3, "sawtooth", 0.07); }

// === Helpers ===
function getTile(tx, ty) {
  const st = stages[stageIndex];
  if (!st || ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) return 1;
  return st.tiles[ty][tx];
}

function isSolid(tx, ty) {
  return getTile(tx, ty) === 1;
}

function isPlatformAt(tx, ty) {
  return getTile(tx, ty) === 2;
}

function isSpike(tx, ty) {
  return getTile(tx, ty) === 3;
}

function boxOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 20 + Math.random() * 20,
      color,
    });
  }
}

// === Stage Init ===
function initStage() {
  const st = stages[stageIndex];
  player = {
    x: st.playerStart.x * TILE + 2,
    y: st.playerStart.y * TILE,
    w: 12,
    h: 15,
    vx: 0,
    vy: 0,
    onGround: false,
    facing: 1,
    attacking: 0,
    invincible: 0,
    walkFrame: 0,
  };
  hasKey = false;
  doorOpen = false;
  enemyList = st.enemies.map(e => ({
    ...e,
    x: e.x * TILE + 2,
    y: e.y * TILE,
    w: 12,
    h: 14,
    alive: true,
    frame: 0,
    origVx: e.vx || 0,
    origVy: e.vy || 0,
    vx: e.vx || 0,
    vy: e.vy || 0,
  }));
  particles = [];
  screenShake = 0;
}

// === Collision ===
function moveEntity(ent) {
  // Horizontal
  ent.x += ent.vx;
  const leftTile = Math.floor(ent.x / TILE);
  const rightTile = Math.floor((ent.x + ent.w - 1) / TILE);
  const topTile = Math.floor(ent.y / TILE);
  const botTile = Math.floor((ent.y + ent.h - 1) / TILE);

  for (let ty = topTile; ty <= botTile; ty++) {
    for (let tx = leftTile; tx <= rightTile; tx++) {
      if (isSolid(tx, ty)) {
        if (ent.vx > 0) {
          ent.x = tx * TILE - ent.w;
        } else if (ent.vx < 0) {
          ent.x = (tx + 1) * TILE;
        }
        if (ent === player) ent.vx = 0;
      }
    }
  }

  // Vertical
  const wasAbove = ent.y + ent.h;
  ent.y += ent.vy;
  const leftTile2 = Math.floor(ent.x / TILE);
  const rightTile2 = Math.floor((ent.x + ent.w - 1) / TILE);
  const topTile2 = Math.floor(ent.y / TILE);
  const botTile2 = Math.floor((ent.y + ent.h - 1) / TILE);

  ent.onGround = false;

  for (let ty = topTile2; ty <= botTile2; ty++) {
    for (let tx = leftTile2; tx <= rightTile2; tx++) {
      if (isSolid(tx, ty)) {
        if (ent.vy > 0) {
          ent.y = ty * TILE - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        } else if (ent.vy < 0) {
          ent.y = (ty + 1) * TILE;
          ent.vy = 0;
        }
      }
      // Platform (one-way: only from above)
      if (isPlatformAt(tx, ty) && ent.vy >= 0) {
        const platTop = ty * TILE;
        if (wasAbove <= platTop + 2 && ent.y + ent.h > platTop) {
          ent.y = platTop - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        }
      }
    }
  }
}

// === Update ===
function updatePlaying() {
  const st = stages[stageIndex];

  // Player movement
  const left = keys["ArrowLeft"] || keys["KeyA"];
  const right = keys["ArrowRight"] || keys["KeyD"];
  const jump = keys["ArrowUp"] || keys["KeyW"] || keys["Space"];
  const attack = keys["KeyZ"] || keys["KeyX"];

  if (left) { player.vx = -MOVE_SPEED; player.facing = -1; }
  else if (right) { player.vx = MOVE_SPEED; player.facing = 1; }
  else { player.vx = 0; }

  if (jump && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    sfxJump();
  }

  // Attack
  if (attack && player.attacking === 0) {
    player.attacking = ATTACK_DURATION;
    sfxAttack();
  }
  if (player.attacking > 0) player.attacking--;

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  moveEntity(player);

  // Walk animation
  if (Math.abs(player.vx) > 0 && player.onGround) {
    player.walkFrame = (player.walkFrame + 0.2) % 4;
  } else if (!player.onGround) {
    player.walkFrame = 1;
  } else {
    player.walkFrame = 0;
  }

  // Invincibility
  if (player.invincible > 0) player.invincible--;

  // Spike check
  const pcx = Math.floor((player.x + player.w / 2) / TILE);
  const pcy = Math.floor((player.y + player.h - 1) / TILE);
  if (isSpike(pcx, pcy)) {
    playerHit();
    return;
  }

  // Key pickup
  if (!hasKey) {
    const kx = st.keyPos.x * TILE;
    const ky = st.keyPos.y * TILE;
    if (boxOverlap(player, { x: kx + 2, y: ky + 2, w: 12, h: 12 })) {
      hasKey = true;
      doorOpen = true;
      sfxKey();
      spawnParticles(kx + 8, ky + 8, C.key, 12);
      score += 100;
    }
  }

  // Door check
  if (doorOpen) {
    const dx = st.doorPos.x * TILE;
    const dy = st.doorPos.y * TILE;
    if (boxOverlap(player, { x: dx + 2, y: dy + 2, w: 12, h: 12 })) {
      sfxDoor();
      score += 500;
      state = "stageclear";
      stateTimer = 90;
      spawnParticles(player.x + 6, player.y + 8, C.doorHi, 20);
    }
  }

  // Enemy update
  for (const e of enemyList) {
    if (!e.alive) continue;
    e.frame++;

    if (e.type === "walker") {
      e.vx = (e.dir || 1) * (1 + stageIndex * 0.15);
      e.vy += GRAVITY;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;

      const prevX = e.x;
      e.x += e.vx;
      e.y += e.vy;

      // Wall collision
      const eTileL = Math.floor(e.x / TILE);
      const eTileR = Math.floor((e.x + e.w - 1) / TILE);
      const eTileT = Math.floor(e.y / TILE);
      const eTileB = Math.floor((e.y + e.h - 1) / TILE);

      // Ground
      for (let tx = eTileL; tx <= eTileR; tx++) {
        if (isSolid(tx, eTileB) || isPlatformAt(tx, eTileB)) {
          const tileTop = eTileB * TILE;
          if (e.y + e.h > tileTop) {
            e.y = tileTop - e.h;
            e.vy = 0;
          }
        }
      }

      // Turn at walls or boundaries
      if (e.x <= e.minX * TILE || isSolid(eTileL, Math.floor((e.y + e.h / 2) / TILE))) {
        e.dir = 1;
        e.x = prevX;
      }
      if (e.x + e.w >= (e.maxX + 1) * TILE || isSolid(eTileR, Math.floor((e.y + e.h / 2) / TILE))) {
        e.dir = -1;
        e.x = prevX;
      }

      // Edge detection - turn at platform edges
      if (e.vy === 0) {
        const checkDir = e.dir > 0 ? Math.floor((e.x + e.w) / TILE) : Math.floor(e.x / TILE) - 1;
        const below = Math.floor((e.y + e.h) / TILE);
        if (!isSolid(checkDir, below) && !isPlatformAt(checkDir, below)) {
          // only turn if standing on a platform/solid
          const standTile = Math.floor((e.y + e.h) / TILE);
          const standX = Math.floor((e.x + e.w / 2) / TILE);
          if (isSolid(standX, standTile) || isPlatformAt(standX, standTile)) {
            e.dir *= -1;
          }
        }
      }

    } else if (e.type === "bouncer") {
      e.vy += GRAVITY;
      e.x += e.vx;
      e.y += e.vy;

      // Wall bounce
      const bTileL = Math.floor(e.x / TILE);
      const bTileR = Math.floor((e.x + e.w - 1) / TILE);
      if (isSolid(bTileL, Math.floor((e.y + e.h / 2) / TILE)) ||
          isSolid(bTileR, Math.floor((e.y + e.h / 2) / TILE))) {
        e.vx *= -1;
        e.x += e.vx * 2;
      }

      // Floor/ceiling bounce
      const bTileB = Math.floor((e.y + e.h - 1) / TILE);
      const bTileT = Math.floor(e.y / TILE);
      if (isSolid(Math.floor((e.x + e.w / 2) / TILE), bTileB)) {
        e.vy = e.origVy;
        e.y = bTileB * TILE - e.h;
      }
      if (isSolid(Math.floor((e.x + e.w / 2) / TILE), bTileT)) {
        e.vy = Math.abs(e.vy);
        e.y = (bTileT + 1) * TILE;
      }
    }

    // Player-enemy collision
    if (e.alive && player.invincible === 0 && boxOverlap(player, e)) {
      // Check if attacking
      if (player.attacking > 0) {
        e.alive = false;
        score += 200;
        spawnParticles(e.x + 6, e.y + 7, C.enemy, 10);
        screenShake = 6;
      } else {
        playerHit();
        return;
      }
    }

    // Attack range kill
    if (e.alive && player.attacking > 0 && player.attacking > ATTACK_DURATION - 6) {
      const atkX = player.facing > 0 ? player.x + player.w : player.x - ATTACK_RANGE;
      const atkBox = { x: atkX, y: player.y, w: ATTACK_RANGE, h: player.h };
      if (boxOverlap(atkBox, e)) {
        e.alive = false;
        score += 200;
        spawnParticles(e.x + 6, e.y + 7, C.enemy, 10);
        screenShake = 6;
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (screenShake > 0) screenShake--;
}

function playerHit() {
  if (player.invincible > 0) return;
  lives--;
  sfxHit();
  screenShake = 10;
  spawnParticles(player.x + 6, player.y + 8, C.player, 8);

  if (lives <= 0) {
    sfxDeath();
    state = "gameover";
    stateTimer = 120;
    if (score > hiScore) hiScore = score;
  } else {
    player.invincible = INVINCIBLE_TIME;
    // Reset position
    const st = stages[stageIndex];
    player.x = st.playerStart.x * TILE + 2;
    player.y = st.playerStart.y * TILE;
    player.vx = 0;
    player.vy = 0;
  }
}

// === Drawing ===
function drawTile(tx, ty, type) {
  const x = tx * TILE;
  const y = ty * TILE;

  if (type === 1) {
    // Brick
    ctx.fillStyle = C.brick;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.brickHi;
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillRect(x, y, 2, TILE);
    ctx.fillStyle = C.brickSh;
    ctx.fillRect(x + TILE - 2, y, 2, TILE);
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
    // Brick lines
    ctx.fillStyle = C.brickSh;
    ctx.fillRect(x + 7, y + 1, 1, 6);
    ctx.fillRect(x + 1, y + 7, TILE - 2, 1);
    ctx.fillRect(x + 3, y + 8, 1, 7);
    ctx.fillRect(x + 11, y + 8, 1, 7);
  } else if (type === 2) {
    // Platform
    ctx.fillStyle = C.platform;
    ctx.fillRect(x, y, TILE, 6);
    ctx.fillStyle = C.platHi;
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillStyle = C.platSh;
    ctx.fillRect(x, y + 5, TILE, 1);
    // Support dots
    ctx.fillStyle = C.platSh;
    ctx.fillRect(x + 3, y + 7, 2, 2);
    ctx.fillRect(x + 11, y + 7, 2, 2);
  } else if (type === 3) {
    // Spike
    ctx.fillStyle = C.spike;
    ctx.beginPath();
    ctx.moveTo(x + 2, y + TILE);
    ctx.lineTo(x + 8, y + 4);
    ctx.lineTo(x + 14, y + TILE);
    ctx.fill();
    ctx.fillStyle = C.spikeSh;
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 4);
    ctx.lineTo(x + 14, y + TILE);
    ctx.lineTo(x + 8, y + TILE);
    ctx.fill();
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0) return;

  const x = Math.round(player.x);
  const y = Math.round(player.y);
  const f = player.facing;

  // Body
  ctx.fillStyle = C.player;
  ctx.fillRect(x + 2, y + 4, 8, 8);
  // Head
  ctx.fillStyle = C.playerHi;
  ctx.fillRect(x + 3, y, 6, 5);
  // Eyes
  ctx.fillStyle = "#fff";
  ctx.fillRect(x + (f > 0 ? 6 : 4), y + 2, 2, 2);
  ctx.fillStyle = "#222";
  ctx.fillRect(x + (f > 0 ? 7 : 4), y + 2, 1, 2);
  // Legs
  const legOff = Math.floor(player.walkFrame) % 2 === 0 ? 0 : 2;
  ctx.fillStyle = C.playerSh;
  ctx.fillRect(x + 2, y + 12, 3, 3 - legOff);
  ctx.fillRect(x + 7, y + 12, 3, 3 - (legOff ? 0 : 2));

  // Attack slash
  if (player.attacking > 0) {
    ctx.fillStyle = C.attack;
    ctx.globalAlpha = player.attacking / ATTACK_DURATION;
    const atkX = f > 0 ? x + 12 : x - ATTACK_RANGE + 2;
    ctx.fillRect(atkX, y + 2, ATTACK_RANGE - 4, 3);
    ctx.fillRect(atkX + 2, y + 5, ATTACK_RANGE - 6, 2);
    ctx.globalAlpha = 1;
  }
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = Math.round(e.x);
  const y = Math.round(e.y);

  if (e.type === "walker") {
    // Body
    ctx.fillStyle = C.enemy;
    ctx.fillRect(x + 1, y + 2, 10, 10);
    ctx.fillStyle = C.enemyHi;
    ctx.fillRect(x + 1, y + 2, 10, 3);
    // Eyes
    ctx.fillStyle = "#fff";
    ctx.fillRect(x + 2, y + 4, 3, 3);
    ctx.fillRect(x + 7, y + 4, 3, 3);
    ctx.fillStyle = "#222";
    ctx.fillRect(x + 3, y + 5, 2, 2);
    ctx.fillRect(x + 8, y + 5, 2, 2);
    // Feet
    const fOff = Math.floor(e.frame / 8) % 2;
    ctx.fillStyle = C.enemySh;
    ctx.fillRect(x + 1, y + 12, 4, 2 - fOff);
    ctx.fillRect(x + 7, y + 12, 4, 2 - (fOff ? 0 : 1));
  } else if (e.type === "bouncer") {
    // Bouncing ball enemy
    ctx.fillStyle = C.enemy;
    ctx.fillRect(x + 2, y + 2, 8, 10);
    ctx.fillRect(x + 1, y + 3, 10, 8);
    ctx.fillStyle = C.enemyHi;
    ctx.fillRect(x + 3, y + 2, 6, 3);
    // Eyes
    ctx.fillStyle = "#fff";
    ctx.fillRect(x + 3, y + 5, 2, 2);
    ctx.fillRect(x + 7, y + 5, 2, 2);
    ctx.fillStyle = "#222";
    ctx.fillRect(x + 4, y + 6, 1, 1);
    ctx.fillRect(x + 8, y + 6, 1, 1);
  }
}

function drawKey() {
  if (hasKey) return;
  const st = stages[stageIndex];
  const kx = st.keyPos.x * TILE;
  const ky = st.keyPos.y * TILE;
  const bob = Math.sin(frame * 0.08) * 2;

  ctx.fillStyle = C.key;
  // Key head (circle-ish)
  ctx.fillRect(kx + 4, ky + 2 + bob, 8, 6);
  ctx.fillRect(kx + 5, ky + 1 + bob, 6, 8);
  ctx.fillStyle = C.bg;
  ctx.fillRect(kx + 7, ky + 3 + bob, 3, 3);
  // Key shaft
  ctx.fillStyle = C.key;
  ctx.fillRect(kx + 6, ky + 9 + bob, 3, 5);
  // Key teeth
  ctx.fillRect(kx + 9, ky + 11 + bob, 2, 2);
  // Shine
  ctx.fillStyle = "#fff";
  ctx.fillRect(kx + 5, ky + 2 + bob, 2, 2);
}

function drawDoor() {
  const st = stages[stageIndex];
  const dx = st.doorPos.x * TILE;
  const dy = st.doorPos.y * TILE;

  if (doorOpen) {
    ctx.fillStyle = C.door;
    ctx.fillRect(dx + 2, dy + 1, 12, 14);
    ctx.fillStyle = C.doorHi;
    ctx.fillRect(dx + 2, dy + 1, 12, 3);
    // Open indicator - pulsing
    ctx.fillStyle = frame % 30 < 15 ? "#fff" : C.doorHi;
    ctx.fillRect(dx + 5, dy + 5, 6, 6);
    ctx.fillStyle = C.door;
    ctx.fillRect(dx + 6, dy + 6, 4, 4);
  } else {
    ctx.fillStyle = C.doorSh;
    ctx.fillRect(dx + 2, dy + 1, 12, 14);
    ctx.fillStyle = C.doorSh;
    ctx.fillRect(dx + 2, dy + 1, 12, 3);
    // Lock
    ctx.fillStyle = C.keySh;
    ctx.fillRect(dx + 6, dy + 7, 4, 4);
  }
}

function drawHUD() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, NATIVE_W, TILE);

  ctx.fillStyle = C.hud;
  ctx.font = "10px monospace";
  ctx.textBaseline = "top";

  ctx.fillText("SCORE:" + String(score).padStart(6, "0"), 4, 3);
  ctx.fillText("STAGE:" + (stageIndex + 1), 108, 3);

  // Lives as hearts
  for (let i = 0; i < lives; i++) {
    const hx = 196 + i * 14;
    ctx.fillStyle = C.enemy;
    ctx.fillRect(hx, 4, 3, 3);
    ctx.fillRect(hx + 4, 4, 3, 3);
    ctx.fillRect(hx - 1, 6, 9, 3);
    ctx.fillRect(hx, 8, 7, 2);
    ctx.fillRect(hx + 1, 10, 5, 1);
    ctx.fillRect(hx + 2, 11, 3, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 40;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 3, 3);
  }
  ctx.globalAlpha = 1;
}

function drawTitle() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, NATIVE_W, NATIVE_H);

  // Decorative border
  for (let i = 0; i < COLS; i++) {
    drawTile(i, 0, 1);
    drawTile(i, ROWS - 1, 1);
  }
  for (let i = 1; i < ROWS - 1; i++) {
    drawTile(0, i, 1);
    drawTile(COLS - 1, i, 1);
  }

  // Stars
  ctx.fillStyle = C.star;
  for (let i = 0; i < 12; i++) {
    const sx = 30 + ((i * 37 + frame) % 196);
    const sy = 30 + ((i * 53) % 160);
    const size = (Math.sin(frame * 0.05 + i) > 0) ? 2 : 1;
    ctx.fillRect(sx, sy, size, size);
  }

  ctx.font = "bold 10px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // Title
  const titleY = 60;
  ctx.fillStyle = C.title;
  ctx.font = "bold 20px monospace";
  ctx.fillText("KEY ESCAPE", NATIVE_W / 2, titleY);

  // Subtitle
  ctx.font = "10px monospace";
  ctx.fillStyle = C.hud;
  ctx.fillText("- GET THE KEY, REACH THE DOOR -", NATIVE_W / 2, titleY + 24);

  // Key illustration
  const ikx = NATIVE_W / 2 - 6;
  const iky = titleY + 46;
  ctx.fillStyle = C.key;
  ctx.fillRect(ikx + 2, iky, 8, 6);
  ctx.fillRect(ikx + 3, iky - 1, 6, 8);
  ctx.fillStyle = C.bg;
  ctx.fillRect(ikx + 5, iky + 1, 3, 3);
  ctx.fillStyle = C.key;
  ctx.fillRect(ikx + 4, iky + 7, 3, 5);
  ctx.fillRect(ikx + 7, iky + 9, 2, 2);

  // Instructions
  ctx.fillStyle = C.hud;
  ctx.font = "10px monospace";
  ctx.fillText("ARROW KEYS / WASD : MOVE", NATIVE_W / 2, 148);
  ctx.fillText("UP / W / SPACE : JUMP", NATIVE_W / 2, 164);
  ctx.fillText("Z or X : ATTACK", NATIVE_W / 2, 180);

  // Start prompt
  if (Math.floor(frame / 30) % 2 === 0) {
    ctx.fillStyle = C.title;
    ctx.fillText("PRESS SPACE TO START", NATIVE_W / 2, 210);
  }

  // Hi Score
  ctx.fillStyle = C.hudSh;
  ctx.fillText("HI:" + String(hiScore).padStart(6, "0"), NATIVE_W / 2, 226);

  ctx.textAlign = "left";
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, NATIVE_W, NATIVE_H);

  ctx.textAlign = "center";
  ctx.fillStyle = C.enemy;
  ctx.font = "bold 20px monospace";
  ctx.fillText("GAME OVER", NATIVE_W / 2, 100);

  ctx.fillStyle = C.hud;
  ctx.font = "10px monospace";
  ctx.fillText("SCORE:" + String(score).padStart(6, "0"), NATIVE_W / 2, 130);

  if (score >= hiScore) {
    ctx.fillStyle = C.title;
    ctx.fillText("NEW HIGH SCORE!", NATIVE_W / 2, 148);
  }

  if (stateTimer <= 0 && Math.floor(frame / 30) % 2 === 0) {
    ctx.fillStyle = C.hud;
    ctx.fillText("PRESS SPACE", NATIVE_W / 2, 178);
  }
  ctx.textAlign = "left";
}

function drawStageClear() {
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, NATIVE_W, NATIVE_H);

  ctx.textAlign = "center";
  ctx.fillStyle = C.doorHi;
  ctx.font = "bold 16px monospace";
  ctx.fillText("STAGE CLEAR!", NATIVE_W / 2, 100);

  ctx.fillStyle = C.hud;
  ctx.font = "10px monospace";
  ctx.fillText("SCORE:" + String(score).padStart(6, "0"), NATIVE_W / 2, 130);
  ctx.textAlign = "left";
}

function drawAllClear() {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, NATIVE_W, NATIVE_H);

  ctx.textAlign = "center";

  ctx.fillStyle = C.title;
  ctx.font = "bold 16px monospace";
  ctx.fillText("CONGRATULATIONS!", NATIVE_W / 2, 80);

  ctx.fillStyle = C.doorHi;
  ctx.font = "bold 12px monospace";
  ctx.fillText("ALL STAGES CLEAR!", NATIVE_W / 2, 104);

  ctx.fillStyle = C.hud;
  ctx.font = "10px monospace";
  ctx.fillText("FINAL SCORE:" + String(score).padStart(6, "0"), NATIVE_W / 2, 134);

  // Stars celebration
  for (let i = 0; i < 8; i++) {
    const a = frame * 0.03 + i * Math.PI / 4;
    const r = 30 + Math.sin(frame * 0.02 + i) * 10;
    const sx = NATIVE_W / 2 + Math.cos(a) * r;
    const sy = 90 + Math.sin(a) * r * 0.5;
    ctx.fillStyle = i % 2 === 0 ? C.key : C.doorHi;
    ctx.fillRect(sx, sy, 3, 3);
  }

  if (stateTimer <= 0 && Math.floor(frame / 30) % 2 === 0) {
    ctx.fillStyle = C.hud;
    ctx.fillText("PRESS SPACE", NATIVE_W / 2, 178);
  }
  ctx.textAlign = "left";
}

// === Main Loop ===
function gameLoop() {
  frame++;

  // State transitions
  if (state === "title") {
    if (keys["Space"] || keys["Enter"]) {
      initAudio();
      stageIndex = 0;
      lives = INITIAL_LIVES;
      score = 0;
      initStage();
      state = "playing";
      keys["Space"] = false;
      keys["Enter"] = false;
    }
  } else if (state === "playing") {
    updatePlaying();
  } else if (state === "stageclear") {
    stateTimer--;
    // Still update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (stateTimer <= 0) {
      stageIndex++;
      if (stageIndex >= stages.length) {
        state = "allclear";
        stateTimer = 90;
        if (score > hiScore) hiScore = score;
      } else {
        initStage();
        state = "playing";
      }
    }
  } else if (state === "gameover" || state === "allclear") {
    if (stateTimer > 0) stateTimer--;
    if (stateTimer <= 0 && (keys["Space"] || keys["Enter"])) {
      state = "title";
      keys["Space"] = false;
      keys["Enter"] = false;
    }
  }

  // === Render ===
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake,
      (Math.random() - 0.5) * screenShake
    );
  }

  if (state === "title") {
    drawTitle();
  } else {
    // BG
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, NATIVE_W, NATIVE_H);

    // Tiles
    const st = stages[stageIndex];
    if (st) {
      for (let ty = 0; ty < ROWS; ty++) {
        for (let tx = 0; tx < COLS; tx++) {
          const t = st.tiles[ty][tx];
          if (t > 0) drawTile(tx, ty, t);
        }
      }
    }

    drawDoor();
    drawKey();

    for (const e of enemyList) drawEnemy(e);

    drawPlayer();
    drawParticles();
    drawHUD();

    if (state === "stageclear") drawStageClear();
    else if (state === "gameover") drawGameOver();
    else if (state === "allclear") drawAllClear();
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
