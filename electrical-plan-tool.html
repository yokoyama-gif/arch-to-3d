/* ---- 7. 座標変換 ---- */
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function resizeCanvas(){
  const stage=document.getElementById('stage');
  const r=stage.getBoundingClientRect();
  canvas.width=r.width*devicePixelRatio;
  canvas.height=r.height*devicePixelRatio;
  canvas.style.width=r.width+'px';
  canvas.style.height=r.height+'px';
  render();
}
window.addEventListener('resize',resizeCanvas);

function world2screen(x,y){
  const cx=canvas.width/2,cy=canvas.height/2;
  const s=state.view.scale*devicePixelRatio;
  return{x:cx+(x-state.view.ox)*s, y:cy-(y-state.view.oy)*s};
}
function screen2world(sx,sy){
  const cx=canvas.width/2,cy=canvas.height/2;
  const s=state.view.scale*devicePixelRatio;
  const px=sx*devicePixelRatio,py=sy*devicePixelRatio;
  return{x:state.view.ox+(px-cx)/s, y:state.view.oy-(py-cy)/s};
}
function snap(wp){
  if(state.snap<=0) return{x:wp.x,y:wp.y};
  return{x:Math.round(wp.x/state.snap)*state.snap, y:Math.round(wp.y/state.snap)*state.snap};
}

/* ---- 8. スナップ（グリッド＋記号中心） ---- */
function getSnapPoint(wp){
  // 記号中心に近ければ優先スナップ
  const symTol = state.symSize * 0.6;
  for(let i=state.symbols.length-1;i>=0;i--){
    const s=state.symbols[i];
    if(Math.abs(s.x-wp.x)<symTol && Math.abs(s.y-wp.y)<symTol){
      state.snapHint={x:s.x,y:s.y,id:s.id};
      return{x:s.x,y:s.y};
    }
  }
  // ジョイントBOX / 配線端点にもスナップ
  const wTol = state.symSize * 0.4;
  for(const w of state.wires){
    for(const pt of w.points){
      if(Math.abs(pt.x-wp.x)<wTol && Math.abs(pt.y-wp.y)<wTol){
        state.snapHint={x:pt.x,y:pt.y,id:null};
        return{x:pt.x,y:pt.y};
      }
    }
  }
  state.snapHint=null;
  return snap(wp);
}

/* ---- 直交配線ルーティング ---- */
function getOrthoPoints(p1, p2, mode){
  if(mode==='free') return [p1,p2];
  const dx=Math.abs(p2.x-p1.x), dy=Math.abs(p2.y-p1.y);
  if(dx<1 || dy<1) return [p1,p2]; // 既に直線
  if(mode==='H'){
    return [p1, {x:p2.x, y:p1.y}, p2];
  } else {
    return [p1, {x:p1.x, y:p2.y}, p2];
  }
}

/* ---- 9. レンダリング ---- */
function render(){
  const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#f4f4ee';
  ctx.fillRect(0,0,w,h);
  // 背景画像 (PDF/画像)
  if(state.bgImage&&LAYERS['BG'].visible) drawBgImage();
  drawGrid();
  if(LAYERS['BG'].visible) drawBackground();
  if(LAYERS['E-WIRE'].visible){ drawWires(); drawJunctions(); }
  if(LAYERS['E-HOME'].visible) drawHomeruns();
  if(LAYERS['E-TEXT'].visible) drawTexts();
  drawSymbols();
  if(state.drawingWire) drawWirePreview();
  drawSheetFrame();
  drawEmptyHint();
  updateStats();
}

function drawGrid(){
  if(state.snap<=0) return;
  const s=state.view.scale*devicePixelRatio;
  if(s<0.04) return;
  const tl=screen2world(0,0);
  const br=screen2world(canvas.width/devicePixelRatio,canvas.height/devicePixelRatio);
  const step=state.snap;
  const xMin=Math.floor(tl.x/step)*step,xMax=Math.ceil(br.x/step)*step;
  const yMin=Math.floor(br.y/step)*step,yMax=Math.ceil(tl.y/step)*step;
  ctx.strokeStyle='rgba(168,50,50,0.06)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=xMin;x<=xMax;x+=step){const p1=world2screen(x,yMin),p2=world2screen(x,yMax);ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);}
  for(let y=yMin;y<=yMax;y+=step){const p1=world2screen(xMin,y),p2=world2screen(xMax,y);ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);}
  ctx.stroke();
  // 原点
  const o=world2screen(0,0);
  ctx.strokeStyle='rgba(168,50,50,0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(o.x-10,o.y);ctx.lineTo(o.x+10,o.y);ctx.moveTo(o.x,o.y-10);ctx.lineTo(o.x,o.y+10);ctx.stroke();
}

function drawBgImage(){
  const bg=state.bgImage;if(!bg||!bg.img) return;
  // 画像中心 (bg.x,bg.y) に幅 bg.w mm × 高さ bg.h mm で配置
  const tl=world2screen(bg.x-bg.w/2, bg.y+bg.h/2);
  const br=world2screen(bg.x+bg.w/2, bg.y-bg.h/2);
  const sw=br.x-tl.x, sh=br.y-tl.y;
  ctx.save();
  ctx.globalAlpha=bg.opacity!=null?bg.opacity:0.7;
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(bg.img, tl.x, tl.y, sw, sh);
  ctx.restore();
}

function drawBackground(){
  ctx.strokeStyle=LAYERS['BG'].color;ctx.lineWidth=1.0;ctx.lineCap='round';ctx.lineJoin='round';
  for(const e of state.bgEntities){
    if(e.type==='LINE'){
      const p1=world2screen(e.x1,e.y1),p2=world2screen(e.x2,e.y2);
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    } else if(e.type==='POLYLINE'){
      ctx.beginPath();
      for(let i=0;i<e.points.length;i++){const p=world2screen(e.points[i].x,e.points[i].y);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
      if(e.closed) ctx.closePath();
      ctx.stroke();
    } else if(e.type==='CIRCLE'){
      const p=world2screen(e.cx,e.cy);const r=e.r*state.view.scale*devicePixelRatio;
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.stroke();
    } else if(e.type==='ARC'){
      const p=world2screen(e.cx,e.cy);const r=e.r*state.view.scale*devicePixelRatio;
      ctx.beginPath();ctx.arc(p.x,p.y,r,-e.endAngle*Math.PI/180,-e.startAngle*Math.PI/180);ctx.stroke();
    } else if(e.type==='TEXT'){
      const p=world2screen(e.x,e.y);const hh=e.h*state.view.scale*devicePixelRatio;
      if(hh<5) continue;
      ctx.save();
      ctx.fillStyle=LAYERS['BG'].color;
      ctx.font=`${hh}px "Yu Gothic UI","Meiryo UI",sans-serif`;
      // DXF整列コード -> canvas textAlign / textBaseline
      // halign: 0=Left,1=Center,2=Right,3=Aligned,4=Middle,5=Fit
      // valign: 0=Baseline,1=Bottom,2=Middle,3=Top
      const hMap={0:'left',1:'center',2:'right',3:'left',4:'center',5:'left'};
      const vMap={0:'alphabetic',1:'bottom',2:'middle',3:'top'};
      ctx.textAlign=hMap[e.halign||0]||'left';
      ctx.textBaseline=vMap[e.valign||0]||'alphabetic';
      // 回転（DXFは度・反時計回り、canvasは度・時計回り → 符号反転）
      if(e.rot){
        ctx.translate(p.x,p.y);
        ctx.rotate(-(e.rot)*Math.PI/180);
        // MTEXT複数行
        const lines=String(e.text).split('\n');
        const lh=hh*1.25;
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],0,i*lh);
      } else {
        const lines=String(e.text).split('\n');
        const lh=hh*1.25;
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],p.x,p.y+i*lh);
      }
      ctx.restore();
    }
  }
}

/* 電線本数マーク（斜め線）を配線セグメント上に描画 */
function drawConductorMarks(pts, conductors, selW){
  if(conductors<=1) return;
  const s=state.view.scale*devicePixelRatio;
  const markLen=6; // px
  const spacing=5; // px between marks
  for(let i=0;i<pts.length-1;i++){
    const p1=world2screen(pts[i].x,pts[i].y);
    const p2=world2screen(pts[i+1].x,pts[i+1].y);
    const len=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    if(len<20) continue;
    const dx=(p2.x-p1.x)/len, dy=(p2.y-p1.y)/len;
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    const total=(conductors-1)*spacing;
    ctx.lineWidth=selW?2:1.2;
    for(let j=0;j<conductors;j++){
      const off=-total/2+j*spacing;
      const cx2=mx+dx*off, cy2=my+dy*off;
      // 45°の斜め線 (ワイヤ方向に対して垂直方向に markLen/2 ずつ)
      ctx.beginPath();
      ctx.moveTo(cx2-dy*markLen-dx*markLen*0.5, cy2+dx*markLen-dy*markLen*0.5);
      ctx.lineTo(cx2+dy*markLen+dx*markLen*0.5, cy2-dx*markLen+dy*markLen*0.5);
      ctx.stroke();
    }
  }
}

function drawWires(){
  ctx.lineCap='round';ctx.lineJoin='round';
  for(const w of state.wires){
    if(w.points.length<2) continue;
    const sel=state.selected.has(w.id);
    const hov=state.hoverItem&&state.hoverItem.kind==='wire'&&state.hoverItem.id===w.id;
    const col=LAYERS['E-WIRE'].color;
    ctx.strokeStyle=sel?'rgba(204,102,51,0.95)':(hov?'rgba(204,102,51,0.6)':col);
    ctx.lineWidth=sel?2.8:(hov?2.2:1.6);
    if(w.style==='dash') ctx.setLineDash([8,4]); else ctx.setLineDash([]);
    ctx.beginPath();
    for(let i=0;i<w.points.length;i++){
      const p=world2screen(w.points[i].x,w.points[i].y);
      i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    // 電線本数マーク
    ctx.strokeStyle=sel?'rgba(168,50,50,0.9)':col;
    drawConductorMarks(w.points, w.conductors||2, sel);
    // 回路番号
    if(w.circuit && w.points.length>=2){
      const mid=Math.floor((w.points.length-1)/2);
      const pm=world2screen(w.points[mid].x, w.points[mid].y);
      const s=state.view.scale*devicePixelRatio;
      const h=Math.max(8, 80*s);
      if(h>7){
        ctx.save();
        ctx.fillStyle=col;
        ctx.font=`${h}px monospace`;
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(w.circuit, pm.x, pm.y-3);
        ctx.restore();
      }
    }
    // 選択ハイライト：頂点ハンドル（□）を表示
    if(sel){
      ctx.setLineDash([]);
      for(const pt of w.points){
        const sp=world2screen(pt.x,pt.y);
        ctx.fillStyle='#fff';
        ctx.strokeStyle='rgba(168,50,50,0.9)';ctx.lineWidth=1.2;
        ctx.fillRect(sp.x-5,sp.y-5,10,10);
        ctx.strokeRect(sp.x-5,sp.y-5,10,10);
      }
    }
  }
}

/* 接続点ドット (T・X接続に黒丸) */
function findJunctions(){
  const eps=2;
  const map={};
  const key=(x,y)=>`${Math.round(x)},${Math.round(y)}`;
  // 全配線の頂点を登録
  for(const w of state.wires){
    for(const pt of w.points){
      const k=key(pt.x,pt.y);
      if(!map[k]) map[k]={x:pt.x,y:pt.y,wires:new Set()};
      map[k].wires.add(w.id);
    }
  }
  // 頂点がほかの配線セグメント上にあるか検査（T字接続）
  for(const w1 of state.wires){
    for(const pt of w1.points){
      for(const w2 of state.wires){
        if(w2.id===w1.id) continue;
        for(let i=0;i<w2.points.length-1;i++){
          if(distToSeg(pt,w2.points[i],w2.points[i+1])<eps){
            const k=key(pt.x,pt.y);
            if(!map[k]) map[k]={x:pt.x,y:pt.y,wires:new Set()};
            map[k].wires.add(w1.id);
            map[k].wires.add(w2.id);
          }
        }
      }
    }
  }
  // 2本以上の異なる配線が交わる点のみをジャンクションとする
  return Object.values(map).filter(p=>p.wires.size>=2);
}

function drawJunctions(){
  const s=state.view.scale*devicePixelRatio;
  const r=Math.max(3,55*s);
  const junctions=findJunctions();
  ctx.fillStyle=LAYERS['E-WIRE'].color;
  for(const j of junctions){
    const p=world2screen(j.x,j.y);
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
  }
}

function drawWirePreview(){
  const w=state.drawingWire;
  if(!w||w.points.length<1) return;
  const lastPt=w.points[w.points.length-1];
  const hover=state.hover;
  // 直交プレビューポイント計算
  const previewPts=[...w.points, ...getOrthoPoints(lastPt, hover, state.orthoMode).slice(1)];

  ctx.strokeStyle='rgba(168,50,50,0.65)';ctx.lineWidth=1.5;
  if(w.style==='dash') ctx.setLineDash([8,4]); else ctx.setLineDash([]);
  ctx.beginPath();
  for(let i=0;i<previewPts.length;i++){
    const p=world2screen(previewPts[i].x,previewPts[i].y);
    i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(168,50,50,0.65)';
  drawConductorMarks(previewPts, w.conductors||2, false);
  // 確定済み頂点
  for(const pt of w.points){
    const sp=world2screen(pt.x,pt.y);
    ctx.fillStyle='rgba(168,50,50,0.8)';
    ctx.beginPath();ctx.arc(sp.x,sp.y,3,0,Math.PI*2);ctx.fill();
  }
  // 記号スナップヒント
  if(state.snapHint){
    const sh=world2screen(state.snapHint.x,state.snapHint.y);
    const sr=Math.max(6,state.symSize*0.55*state.view.scale*devicePixelRatio);
    ctx.strokeStyle='rgba(168,50,50,0.85)';ctx.lineWidth=1.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(sh.x,sh.y,sr,0,Math.PI*2);ctx.stroke();
    // 十字マーカ
    ctx.beginPath();
    ctx.moveTo(sh.x-sr*.5,sh.y);ctx.lineTo(sh.x+sr*.5,sh.y);
    ctx.moveTo(sh.x,sh.y-sr*.5);ctx.lineTo(sh.x,sh.y+sr*.5);
    ctx.stroke();
  }
}

function drawHomeruns(){
  const s=state.view.scale*devicePixelRatio;
  const u=Math.max(6, 180*s);
  for(const hr of state.homeruns){
    const p=world2screen(hr.x,hr.y);
    const sel=state.selected.has(hr.id);
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(-hr.rot);
    ctx.strokeStyle=sel?'rgba(168,50,50,0.9)':LAYERS['E-HOME'].color;
    ctx.fillStyle=ctx.strokeStyle;
    ctx.lineWidth=sel?2.2:1.4;
    ctx.lineCap='round';ctx.lineJoin='round';
    // 矢印 (→ 向き)
    ctx.beginPath();
    ctx.moveTo(-u*.8,0);ctx.lineTo(u*.8,0);
    ctx.moveTo(u*.4,-u*.35);ctx.lineTo(u*.8,0);ctx.lineTo(u*.4,u*.35);
    ctx.stroke();
    // 底辺の2本線
    ctx.beginPath();
    ctx.moveTo(-u*.8,-u*.22);ctx.lineTo(-u*.8,u*.22);
    ctx.stroke();
    // 回路番号
    if(hr.circuit){
      ctx.scale(1,-1);
      ctx.font=`${Math.max(9,u*.45)}px monospace`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(hr.circuit,0,-u*.2);
    }
    ctx.restore();
    if(sel){
      ctx.strokeStyle='rgba(168,50,50,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,2]);
      ctx.strokeRect(p.x-u*.9,p.y-u*.5,u*1.8,u);
      ctx.setLineDash([]);
    }
  }
}

function drawSymbols(){
  for(const sym of state.symbols){
    const def=SYMBOLS[sym.type];
    if(!def) continue;
    if(!LAYERS[def.layer]?.visible) continue;
    const p=world2screen(sym.x,sym.y);
    const u=state.symSize/2*state.view.scale*devicePixelRatio;
    const sel=state.selected.has(sym.id);
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(-sym.rot);
    ctx.scale(1,-1);
    ctx.strokeStyle=LAYERS[def.layer].color;
    ctx.fillStyle=LAYERS[def.layer].color;
    ctx.lineWidth=sel?2.4:1.4;
    ctx.lineCap='round';ctx.lineJoin='round';
    def.paint(ctx,u);
    if(sel){
      ctx.strokeStyle='rgba(168,50,50,0.55)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
      ctx.scale(1,-1);
      ctx.strokeRect(-u*1.1,-u*1.1,u*2.2,u*2.2);
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
}

function drawTexts(){
  const s=state.view.scale*devicePixelRatio;
  ctx.fillStyle=LAYERS['E-TEXT'].color;
  for(const t of state.texts){
    const p=world2screen(t.x,t.y);
    const h=Math.max(5,t.height*s);
    if(h<4) continue;
    ctx.font=`${h}px "Hiragino Mincho ProN",serif`;
    ctx.textAlign='left';ctx.textBaseline='middle';
    const sel=state.selected.has(t.id);
    if(sel){
      const tw=ctx.measureText(t.text).width;
      ctx.strokeStyle='rgba(168,50,50,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,2]);
      ctx.strokeRect(p.x-2,p.y-h/2-2,tw+4,h+4);ctx.setLineDash([]);
    }
    ctx.fillText(t.text,p.x,p.y);
  }
}

function drawSheetFrame(){
  const w=canvas.width,h=canvas.height;
  const lenPx=1000*state.view.scale*devicePixelRatio;
  if(lenPx<25||lenPx>w*.4) return;
  const x0=w-lenPx-24,y0=h-22;
  ctx.strokeStyle='#1a2332';ctx.fillStyle='#1a2332';ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(x0,y0);ctx.lineTo(x0+lenPx,y0);
  ctx.moveTo(x0,y0-4);ctx.lineTo(x0,y0+4);
  ctx.moveTo(x0+lenPx,y0-4);ctx.lineTo(x0+lenPx,y0+4);
  ctx.stroke();
  ctx.font='9px monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('1000mm',x0+lenPx/2,y0+6);
}

/* ---- 10. 入力 ---- */
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ダブルクリックで配線セグメント上に頂点追加
canvas.addEventListener('dblclick',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const wp=screen2world(sx,sy);
  const sp=getSnapPoint(wp);
  // 配線セグメント上か判定
  for(let i=state.wires.length-1;i>=0;i--){
    const w=state.wires[i];
    for(let j=0;j<w.points.length-1;j++){
      if(distToSeg({x:wp.x,y:wp.y},w.points[j],w.points[j+1])<state.symSize*.4){
        pushHistory();
        w.points.splice(j+1,0,{x:sp.x,y:sp.y});
        state.selected.clear();state.selected.add(w.id);
        toast('頂点を追加しました');
        updateSelectionPanel();render();
        return;
      }
    }
  }
});

canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const wp=screen2world(sx,sy);
  const sp=getSnapPoint(wp);

  if(e.button===1||(e.button===0&&spacePressed)){
    state.panning={sx,sy,ox:state.view.ox,oy:state.view.oy};
    document.getElementById('stage').classList.add('panning');
    return;
  }

  if(e.button===2){
    if(state.drawingWire&&state.drawingWire.points.length>=2){ finishWire(); return; }
    // 選択中の配線の頂点なら削除 / 配線そのものなら丸ごと削除
    const hit2=pickAt(wp.x,wp.y);
    if(hit2&&hit2.kind==='vertex'){
      const w=state.wires.find(w=>w.id===hit2.id);
      if(w&&w.points.length>2){
        pushHistory();
        w.points.splice(hit2.vertIdx,1);
        toast('頂点を削除しました');
        render(); return;
      }
    }
    if(hit2&&(hit2.kind==='wire'||hit2.kind==='symbol'||hit2.kind==='text'||hit2.kind==='homerun')){
      // 右クリックでコンテキスト風: 確認なしで即削除
      pushHistory();
      state.selected.add(hit2.id);
      state.symbols=state.symbols.filter(s=>!state.selected.has(s.id));
      state.wires=state.wires.filter(w=>!state.selected.has(w.id));
      state.texts=state.texts.filter(t=>!state.selected.has(t.id));
      state.homeruns=state.homeruns.filter(h=>!state.selected.has(h.id));
      state.selected.clear();
      buildLayerPanel();updateSelectionPanel();
      toast('要素を削除しました');
      render(); return;
    }
    state.drawingWire=null; state.selected.clear(); updateSelectionPanel(); render();
    return;
  }
  if(e.button!==0) return;

  const t=state.tool;

  if(SYMBOLS[t]){
    pushHistory();
    state.symbols.push({id:uid(),type:t,x:sp.x,y:sp.y,rot:0,layer:SYMBOLS[t].layer});
    buildLayerPanel(); render(); return;
  }

  if(t==='wire'||t==='wire-dash'){
    if(!state.drawingWire){
      state.drawingWire={id:uid(),points:[{x:sp.x,y:sp.y}],style:t==='wire-dash'?'dash':'solid',conductors:state.conductors,circuit:state.circuitNum,layer:'E-WIRE'};
    } else {
      // 直交パスで確定済み点を追加
      const lastPt=state.drawingWire.points[state.drawingWire.points.length-1];
      const ortho=getOrthoPoints(lastPt,sp,state.orthoMode);
      for(let i=1;i<ortho.length;i++) state.drawingWire.points.push(ortho[i]);
    }
    render(); return;
  }

  if(t==='homerun'){
    pushHistory();
    state.homeruns.push({id:uid(),x:sp.x,y:sp.y,rot:0,circuit:state.circuitNum,layer:'E-HOME'});
    buildLayerPanel(); render(); return;
  }

  if(t==='text'){
    const txt=prompt('文字を入力:');
    if(txt&&txt.trim()){
      pushHistory();
      state.texts.push({id:uid(),x:sp.x,y:sp.y,text:txt.trim(),height:state.symSize*.4,layer:'E-TEXT'});
      buildLayerPanel(); render();
    }
    return;
  }

  // 選択
  const hit=pickAt(wp.x,wp.y);
  if(!e.shiftKey) state.selected.clear();
  if(hit){
    state.selected.add(hit.id);
    state.dragging={id:hit.id,kind:hit.kind,vertIdx:hit.vertIdx,startW:wp,orig:snapshotItem(hit)};
    // 配線の場合、プロパティをパネルに反映
    if(hit.kind==='wire'){
      const fw=state.wires.find(w=>w.id===hit.id);
      if(fw){
        state.conductors=fw.conductors||2;
        state.circuitNum=fw.circuit||'';
        document.querySelectorAll('.cond-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.c)===state.conductors));
        const cn=document.getElementById('circuitNum'); if(cn) cn.value=fw.circuit||'';
      }
    }
    if(hit.kind==='homerun'){
      const fh=state.homeruns.find(h=>h.id===hit.id);
      if(fh){
        state.circuitNum=fh.circuit||'';
        const cn=document.getElementById('circuitNum'); if(cn) cn.value=fh.circuit||'';
      }
    }
  }
  updateSelectionPanel(); render();
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const wp=screen2world(sx,sy);
  state.hover=getSnapPoint(wp);

  if(state.panning){
    state.view.ox=state.panning.ox-(sx-state.panning.sx)/state.view.scale;
    state.view.oy=state.panning.oy+(sy-state.panning.sy)/state.view.scale;
    render(); return;
  }
  if(state.dragging){
    const sp2=getSnapPoint(wp);
    const dx=sp2.x-state.dragging.startW.x, dy=sp2.y-state.dragging.startW.y;
    const orig=state.dragging.orig;
    if(state.dragging.kind==='vertex'){
      // 頂点個別移動
      const w=state.wires.find(w=>w.id===state.dragging.id);
      if(w) w.points[state.dragging.vertIdx]={x:sp2.x,y:sp2.y};
    } else if(state.dragging.kind==='symbol'){
      const s=state.symbols.find(s=>s.id===state.dragging.id);
      if(s){s.x=orig.x+dx;s.y=orig.y+dy;}
    } else if(state.dragging.kind==='text'){
      const s=state.texts.find(s=>s.id===state.dragging.id);
      if(s){s.x=orig.x+dx;s.y=orig.y+dy;}
    } else if(state.dragging.kind==='wire'){
      const w=state.wires.find(w=>w.id===state.dragging.id);
      if(w) w.points=orig.points.map(p=>({x:p.x+dx,y:p.y+dy}));
    } else if(state.dragging.kind==='homerun'){
      const hr=state.homeruns.find(h=>h.id===state.dragging.id);
      if(hr){hr.x=orig.x+dx;hr.y=orig.y+dy;}
    }
    render();
  } else if(state.drawingWire){
    render();
  } else if(state.tool==='select'){
    // ホバーハイライト
    const h=pickAt(wp.x,wp.y);
    const prev=state.hoverItem;
    if((!h&&prev)||(h&&(!prev||prev.id!==h.id||prev.kind!==h.kind))){
      state.hoverItem=h;
      canvas.style.cursor=h?(h.kind==='vertex'?'move':'pointer'):'default';
      render();
    }
  }
  const sp=snap(wp);
  document.getElementById('stat-coord').textContent=`${Math.round(sp.x)},${Math.round(sp.y)}`;
  document.getElementById('crosshair-info').textContent=`X=${Math.round(sp.x)}  Y=${Math.round(sp.y)} mm`;
});

canvas.addEventListener('mouseup',e=>{
  if(state.panning){state.panning=null;document.getElementById('stage').classList.remove('panning');}
  if(state.dragging){pushHistory();state.dragging=null;}
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const wp=screen2world(sx,sy);
  const factor=e.deltaY<0?1.15:1/1.15;
  state.view.scale=Math.max(0.003,Math.min(state.view.scale*factor,8));
  const wp2=screen2world(sx,sy);
  state.view.ox+=wp.x-wp2.x;state.view.oy+=wp.y-wp2.y;
  render();
},{passive:false});

let spacePressed=false;
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  if(e.code==='Space'){spacePressed=true;document.getElementById('stage').classList.add('pan');e.preventDefault();}
  if(e.key==='Tab'){
    e.preventDefault();
    const modes=['H','V','free'];
    const idx=modes.indexOf(state.orthoMode);
    state.orthoMode=modes[(idx+1)%modes.length];
    const om=document.getElementById('orthoMode'); if(om) om.value=state.orthoMode;
    toast(`直交モード: ${state.orthoMode==='H'?'水平→垂直':state.orthoMode==='V'?'垂直→水平':'自由'}`);
    render();
  }
  if(e.key==='Escape'){
    if(state.drawingWire&&state.drawingWire.points.length>=2) finishWire();
    else{ state.drawingWire=null; state.selected.clear(); selectTool('select'); }
    render();
  }
  if(e.key==='Delete'||e.key==='Backspace'){
    if(state.selected.size){
      pushHistory();
      state.symbols=state.symbols.filter(s=>!state.selected.has(s.id));
      state.wires=state.wires.filter(w=>!state.selected.has(w.id));
      state.texts=state.texts.filter(t=>!state.selected.has(t.id));
      state.homeruns=state.homeruns.filter(h=>!state.selected.has(h.id));
      state.selected.clear();
      buildLayerPanel();updateSelectionPanel();render();
    }
  }
  if(e.key==='r'||e.key==='R'){
    if(state.selected.size){
      pushHistory();
      for(const id of state.selected){
        const s=state.symbols.find(s=>s.id===id);
        if(s) s.rot=(s.rot+Math.PI/2)%(Math.PI*2);
        const hr=state.homeruns.find(h=>h.id===id);
        if(hr) hr.rot=(hr.rot+Math.PI/2)%(Math.PI*2);
      }
      updateSelectionPanel();render();
    }
  }
  if(e.key==='v'||e.key==='V') selectTool('select');
  if(e.key==='w'||e.key==='W') selectTool('wire');
  if(e.key==='h'||e.key==='H') selectTool('wire-dash');
  if(e.key==='m'||e.key==='M') selectTool('homerun');
  if(e.key==='t'||e.key==='T') selectTool('text');
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){undo();e.preventDefault();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){redo();e.preventDefault();}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){
    e.preventDefault();
    if(state.selected.size>0){
      pushHistory();
      const off=state.snap||91;
      const newIds=new Set();
      for(const id of state.selected){
        const sym=state.symbols.find(s=>s.id===id);
        if(sym){const nid=uid();state.symbols.push({...sym,id:nid,x:sym.x+off,y:sym.y+off});newIds.add(nid);}
        const w=state.wires.find(w=>w.id===id);
        if(w){const nid=uid();state.wires.push({...w,id:nid,points:w.points.map(p=>({x:p.x+off,y:p.y+off}))});newIds.add(nid);}
        const hr=state.homeruns.find(h=>h.id===id);
        if(hr){const nid=uid();state.homeruns.push({...hr,id:nid,x:hr.x+off,y:hr.y+off});newIds.add(nid);}
        const tx=state.texts.find(t=>t.id===id);
        if(tx){const nid=uid();state.texts.push({...tx,id:nid,x:tx.x+off,y:tx.y+off});newIds.add(nid);}
      }
      state.selected=newIds;
      buildLayerPanel();updateSelectionPanel();render();
      toast('複写しました (Ctrl+D)');
    }
  }
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'){spacePressed=false;document.getElementById('stage').classList.remove('pan');}
});

function finishWire(){
  if(state.drawingWire&&state.drawingWire.points.length>=2){
    pushHistory();
    state.wires.push(state.drawingWire);
    buildLayerPanel();
  }
  state.drawingWire=null;render();
}

function pickAt(x,y){
  const tol=state.symSize*.65;
  // 選択済み配線の頂点を最優先（ドラッグしやすくする）
  if(state.selected.size===1){
    const selId=[...state.selected][0];
    const selWire=state.wires.find(w=>w.id===selId);
    if(selWire){
      const vtol=state.symSize*.45;
      for(let j=0;j<selWire.points.length;j++){
        const pt=selWire.points[j];
        if(Math.abs(pt.x-x)<vtol&&Math.abs(pt.y-y)<vtol)
          return{id:selId,kind:'vertex',vertIdx:j};
      }
    }
  }
  for(let i=state.symbols.length-1;i>=0;i--){
    const s=state.symbols[i];
    if(Math.abs(s.x-x)<tol&&Math.abs(s.y-y)<tol) return{id:s.id,kind:'symbol'};
  }
  for(let i=state.homeruns.length-1;i>=0;i--){
    const h=state.homeruns[i];
    if(Math.abs(h.x-x)<tol&&Math.abs(h.y-y)<tol) return{id:h.id,kind:'homerun'};
  }
  for(let i=state.texts.length-1;i>=0;i--){
    const t=state.texts[i];
    const tw=t.text.length*t.height*.6;
    if(x>=t.x-2&&x<=t.x+tw&&Math.abs(y-t.y)<t.height) return{id:t.id,kind:'text'};
  }
  for(let i=state.wires.length-1;i>=0;i--){
    const w=state.wires[i];
    for(let j=0;j<w.points.length-1;j++){
      if(distToSeg({x,y},w.points[j],w.points[j+1])<state.symSize*.35) return{id:w.id,kind:'wire'};
    }
  }
  return null;
}
function distToSeg(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(p.x-a.x,p.y-a.y);
  let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/l2;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-a.x-t*dx,p.y-a.y-t*dy);
}
function snapshotItem(hit){
  if(hit.kind==='symbol'){const s=state.symbols.find(s=>s.id===hit.id);return{x:s.x,y:s.y};}
  if(hit.kind==='text'){const s=state.texts.find(s=>s.id===hit.id);return{x:s.x,y:s.y};}
  if(hit.kind==='wire'||hit.kind==='vertex'){const s=state.wires.find(w=>w.id===hit.id);return{points:s.points.map(p=>({...p}))};}
  if(hit.kind==='homerun'){const s=state.homeruns.find(h=>h.id===hit.id);return{x:s.x,y:s.y};}
  return{};
}

/* ---- 11. 履歴 ---- */
function deepCopy(){
  return{
    symbols:JSON.parse(JSON.stringify(state.symbols)),
    wires:JSON.parse(JSON.stringify(state.wires)),
    texts:JSON.parse(JSON.stringify(state.texts)),
    homeruns:JSON.parse(JSON.stringify(state.homeruns)),
  };
}
function pushHistory(){
  state.history=state.history.slice(0,state.historyIdx+1);
  state.history.push(deepCopy());
  if(state.history.length>60) state.history.shift();
  state.historyIdx=state.history.length-1;
}
function applyHistory(snap){
  state.symbols=snap.symbols;state.wires=snap.wires;state.texts=snap.texts;state.homeruns=snap.homeruns;
  state.selected.clear();
}
function undo(){
  if(state.historyIdx>0){state.historyIdx--;applyHistory(JSON.parse(JSON.stringify(state.history[state.historyIdx])));buildLayerPanel();updateSelectionPanel();render();}
}
function redo(){
  if(state.historyIdx<state.history.length-1){state.historyIdx++;applyHistory(JSON.parse(JSON.stringify(state.history[state.historyIdx])));buildLayerPanel();updateSelectionPanel();render();}
}

/* ---- 12. DXF 読込 ---- */
function parseDxf(text){
  const lines=text.split(/\r?\n/);
  const pairs=[];
  for(let i=0;i<lines.length-1;i+=2){
    const code=parseInt(lines[i].trim(),10);
    const value=lines[i+1];
    if(isNaN(code)){i--;continue;}
    pairs.push([code,value]);
  }

  // セクション・ブロック・エンティティを横断で収集
  const blocks={};        // name -> [entities]
  const topEntities=[];   // ENTITIESセクション直接配下
  let section=null;       // 'ENTITIES' | 'BLOCKS' | other
  let curBlock=null;      // {name, entities}
  let cur=null;
  let polyPts=[],inPoly=false,polyClosed=false;
  let pendingSectionName=false;  // 直後のcode=2でセクション名

  function emit(e){
    if(curBlock) curBlock.entities.push(e);
    else if(section==='ENTITIES') topEntities.push(e);
  }
  function finalizeCur(){
    if(!cur) return;
    const e=cur;
    if(e.type==='LINE'&&e.x1!==undefined) emit({type:'LINE',x1:e.x1,y1:e.y1,x2:e.x2,y2:e.y2});
    else if(e.type==='LWPOLYLINE'&&e.points) emit({type:'POLYLINE',points:e.points,closed:!!e.closed});
    else if(e.type==='VERTEX'&&inPoly&&e._x!==undefined) polyPts.push({x:e._x,y:e._y});
    else if(e.type==='CIRCLE'&&e.cx!==undefined) emit({type:'CIRCLE',cx:e.cx,cy:e.cy,r:e.r});
    else if(e.type==='ARC'&&e.cx!==undefined) emit({type:'ARC',cx:e.cx,cy:e.cy,r:e.r,startAngle:e.startAngle||0,endAngle:e.endAngle||360});
    else if((e.type==='TEXT'||e.type==='MTEXT')&&e.text){
      // 整列コード72/73が0以外なら(x2,y2)を実位置として優先
      const useAlt=(e.halign&&e.halign!==0)||(e.valign&&e.valign!==0);
      const px=useAlt&&e.x2!=null?e.x2:(e.x||0);
      const py=useAlt&&e.y2!=null?e.y2:(e.y||0);
      // MTEXT 改行 \P を改行に
      let txt=String(e.text).replace(/\\P/g,'\n').replace(/\\[A-Za-z][^;]*;/g,'').replace(/[{}]/g,'');
      emit({type:'TEXT',x:px,y:py,h:e.h||100,text:txt,
        halign:e.halign||0,valign:e.valign||0,rot:e.rot||0,
        attachment:e.attachment||0,isMText:e.type==='MTEXT'});
    }
    else if(e.type==='ELLIPSE'&&e.cx!==undefined&&e.mx!==undefined){
      // 簡易: 円として近似 (長径/短径平均)
      const r=Math.hypot(e.mx,e.my)*((e.ratio||1)+1)/2;
      emit({type:'CIRCLE',cx:e.cx,cy:e.cy,r});
    }
    else if(e.type==='SOLID'&&e.x1!==undefined){
      // 三角/四角形を線分で
      const pts=[[e.x1,e.y1],[e.x2,e.y2],[e.x4!==undefined?e.x4:e.x3,e.y4!==undefined?e.y4:e.y3],[e.x3,e.y3]];
      for(let i=0;i<pts.length;i++){
        const a=pts[i],b=pts[(i+1)%pts.length];
        if(a[0]!==undefined&&b[0]!==undefined) emit({type:'LINE',x1:a[0],y1:a[1],x2:b[0],y2:b[1]});
      }
    }
    else if(e.type==='INSERT'&&e.name){
      emit({type:'INSERT',name:e.name,x:e.x||0,y:e.y||0,
        sx:e.sx!=null?e.sx:1,sy:e.sy!=null?e.sy:1,
        rot:(e.rot||0)*Math.PI/180,
        cols:e.cols||1,rows:e.rows||1,colSpace:e.colSpace||0,rowSpace:e.rowSpace||0});
    }
  }

  for(const [code,value] of pairs){
    if(code===0){
      finalizeCur();
      const v=(value||'').trim();
      if(v==='SECTION'){section=null;pendingSectionName=true;cur=null;continue;}
      if(v==='ENDSEC'){section=null;cur=null;curBlock=null;continue;}
      if(v==='EOF') break;
      if(v==='ENDBLK'){
        if(curBlock){curBlock=null;}
        cur=null;continue;
      }
      if(v==='SEQEND'){
        if(inPoly){emit({type:'POLYLINE',points:polyPts.slice(),closed:polyClosed});polyPts=[];inPoly=false;polyClosed=false;}
        cur=null;continue;
      }
      if(v==='BLOCK'){cur={type:'BLOCK'};continue;}
      // エンティティ開始
      if(section==='ENTITIES'||section==='BLOCKS'){
        cur={type:v};
        if(v==='POLYLINE'){inPoly=true;polyPts=[];polyClosed=false;}
      }
      continue;
    }
    if(pendingSectionName&&code===2){section=(value||'').trim();pendingSectionName=false;continue;}
    if(!cur) continue;
    const num=parseFloat(value);
    if(cur.type==='BLOCK'){
      if(code===2){cur.name=(value||'').trim();blocks[cur.name]={name:cur.name,entities:[],bx:0,by:0};curBlock=blocks[cur.name];}
      else if(code===10) curBlock&&(curBlock.bx=num);
      else if(code===20) curBlock&&(curBlock.by=num);
      continue;
    }
    switch(cur.type){
      case 'LINE':
        if(code===10)cur.x1=num;else if(code===20)cur.y1=num;
        else if(code===11)cur.x2=num;else if(code===21)cur.y2=num;break;
      case 'LWPOLYLINE':
        if(code===10)cur._x=num;
        else if(code===20)(cur.points=cur.points||[]).push({x:cur._x,y:num});
        else if(code===70)cur.closed=(parseInt(value,10)&1)===1;break;
      case 'POLYLINE':
        if(code===70)polyClosed=(parseInt(value,10)&1)===1;break;
      case 'VERTEX':
        if(code===10)cur._x=num;else if(code===20)cur._y=num;break;
      case 'CIRCLE':
        if(code===10)cur.cx=num;else if(code===20)cur.cy=num;else if(code===40)cur.r=num;break;
      case 'ARC':
        if(code===10)cur.cx=num;else if(code===20)cur.cy=num;else if(code===40)cur.r=num;
        else if(code===50)cur.startAngle=num;else if(code===51)cur.endAngle=num;break;
      case 'ELLIPSE':
        if(code===10)cur.cx=num;else if(code===20)cur.cy=num;
        else if(code===11)cur.mx=num;else if(code===21)cur.my=num;
        else if(code===40)cur.ratio=num;break;
      case 'TEXT':case 'MTEXT':
        if(code===10)cur.x=num;else if(code===20)cur.y=num;
        else if(code===11)cur.x2=num;else if(code===21)cur.y2=num;
        else if(code===40)cur.h=num;else if(code===50)cur.rot=num;
        else if(code===72)cur.halign=parseInt(value,10)||0;
        else if(code===73)cur.valign=parseInt(value,10)||0;
        else if(code===71)cur.attachment=parseInt(value,10)||0;  // MTEXT
        else if(code===1)cur.text=(cur.text||'')+(value||'');
        else if(code===3)cur.text=(cur.text||'')+(value||'');break;  // MTEXT continuation
      case 'SOLID':
        if(code===10)cur.x1=num;else if(code===20)cur.y1=num;
        else if(code===11)cur.x2=num;else if(code===21)cur.y2=num;
        else if(code===12)cur.x3=num;else if(code===22)cur.y3=num;
        else if(code===13)cur.x4=num;else if(code===23)cur.y4=num;break;
      case 'INSERT':
        if(code===2)cur.name=(value||'').trim();
        else if(code===10)cur.x=num;else if(code===20)cur.y=num;
        else if(code===41)cur.sx=num;else if(code===42)cur.sy=num;
        else if(code===50)cur.rot=num;
        else if(code===70)cur.cols=parseInt(value,10);else if(code===71)cur.rows=parseInt(value,10);
        else if(code===44)cur.colSpace=num;else if(code===45)cur.rowSpace=num;break;
    }
  }
  finalizeCur();

  // ===== INSERT展開 (再帰) =====
  const out=[];
  function expandInsert(ins,parentTx){
    const blk=blocks[ins.name];if(!blk) return;
    // 配列INSERT (cols × rows)
    const cols=Math.max(1,ins.cols||1), rows=Math.max(1,ins.rows||1);
    for(let cc=0;cc<cols;cc++) for(let rr=0;rr<rows;rr++){
      const ox=ins.x + cc*(ins.colSpace||0);
      const oy=ins.y + rr*(ins.rowSpace||0);
      // ローカル変換: scale → rotate → translate(ox-bx*sx, oy-by*sy)
      const tx=composeTx(parentTx,{ox,oy,sx:ins.sx||1,sy:ins.sy||1,rot:ins.rot||0,bx:blk.bx||0,by:blk.by||0});
      for(const e of blk.entities){
        if(e.type==='INSERT'){expandInsert(e,tx);}
        else out.push(transformEntity(e,tx));
      }
    }
  }
  for(const e of topEntities){
    if(e.type==='INSERT') expandInsert(e,identityTx());
    else out.push(e);
  }
  return out;
}

function identityTx(){return {a:1,b:0,c:0,d:1,e:0,f:0};}
// ローカルINSERT: P_world = parent * ( Translate(ox,oy) * Rotate(rot) * Scale(sx,sy) * Translate(-bx,-by) ) * P_local
function composeTx(parent, ins){
  const c=Math.cos(ins.rot), s=Math.sin(ins.rot);
  // ローカル行列
  const a=ins.sx*c, b=ins.sx*s, cc=-ins.sy*s, d=ins.sy*c;
  const e=ins.ox - (a*ins.bx + cc*ins.by);
  const f=ins.oy - (b*ins.bx + d*ins.by);
  // parent * local
  return {
    a:parent.a*a+parent.c*b,
    b:parent.b*a+parent.d*b,
    c:parent.a*cc+parent.c*d,
    d:parent.b*cc+parent.d*d,
    e:parent.a*e+parent.c*f+parent.e,
    f:parent.b*e+parent.d*f+parent.f,
  };
}
function txPt(tx,x,y){return {x:tx.a*x+tx.c*y+tx.e, y:tx.b*x+tx.d*y+tx.f};}
function txScale(tx){return Math.hypot(tx.a,tx.b);}  // 統一スケール近似

function transformEntity(e,tx){
  if(e.type==='LINE'){
    const p1=txPt(tx,e.x1,e.y1),p2=txPt(tx,e.x2,e.y2);
    return {type:'LINE',x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y};
  }
  if(e.type==='POLYLINE'){
    return {type:'POLYLINE',points:e.points.map(p=>txPt(tx,p.x,p.y)),closed:e.closed};
  }
  if(e.type==='CIRCLE'){
    const p=txPt(tx,e.cx,e.cy);
    return {type:'CIRCLE',cx:p.x,cy:p.y,r:e.r*txScale(tx)};
  }
  if(e.type==='ARC'){
    const p=txPt(tx,e.cx,e.cy);
    // 回転考慮
    const rotDeg=Math.atan2(tx.b,tx.a)*180/Math.PI;
    return {type:'ARC',cx:p.x,cy:p.y,r:e.r*txScale(tx),startAngle:(e.startAngle||0)+rotDeg,endAngle:(e.endAngle||0)+rotDeg};
  }
  if(e.type==='TEXT'){
    const p=txPt(tx,e.x,e.y);
    const txRotDeg=Math.atan2(tx.b,tx.a)*180/Math.PI;
    return {type:'TEXT',x:p.x,y:p.y,h:(e.h||100)*txScale(tx),text:e.text,
      halign:e.halign||0,valign:e.valign||0,rot:(e.rot||0)+txRotDeg,
      isMText:e.isMText};
  }
  return e;
}

function handleLoadedFile(f){
  const ext=f.name.toLowerCase().split('.').pop();
  if(ext==='dxf') loadDxfFile(f);
  else if(ext==='pdf') loadPdfFile(f);
  else if(['png','jpg','jpeg','webp','bmp','gif'].includes(ext)) loadImageFile(f);
  else toast('対応していないファイル形式: '+ext);
}

  ctx.setLineDash([]);
  ctx.fillStyle='#993322';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${18*devicePixelRatio}px "Meiryo UI",sans-serif`;
  ctx.fillText('ファイルをここにドラッグ&ドロップ',w/2,h/2-22*devicePixelRatio);

function loadDxfFile(f){
  toast(`${f.name} を読込中...`);
  const reader=new FileReader();
  reader.onerror=()=>toast('DXF読込エラー: ファイルを開けません');
  reader.onload=ev=>{
    try{
      const utf8=ev.target.result;
      if((utf8.match(/�/g)||[]).length>5){
        const r2=new FileReader();
        r2.onload=ev2=>loadDxfText(ev2.target.result,f.name);
        r2.readAsText(f,'shift-jis');return;
      }
      loadDxfText(utf8,f.name);
    }catch(err){toast('DXFパースエラー: '+err.message);}
  };
  reader.readAsText(f,'utf-8');
}
function loadDxfText(text,name){
  pushHistory();
  try{
    const t0=performance.now();
    state.bgEntities=parseDxf(text);
    const ms=Math.round(performance.now()-t0);
    if(state.bgEntities.length===0){
      toast(`${name}: エンティティが見つかりませんでした。BLOCK内/未対応形式の可能性`);
    } else {
      // 図面範囲から自動的に記号サイズを推定
      const ext=computeExtent(state.bgEntities);
      if(ext){
        const dim=Math.max(ext.w,ext.h);
        // 記号は図面寸法の約 1/100 (例: 700mm の図面 → 7mm 記号 / 30000mm の実寸 → 300mm 記号)
        let auto=Math.round(Math.max(5,Math.min(1000, dim/100)));
        // 5の倍数に丸め
        auto=Math.round(auto/5)*5;
        state.symSize=auto;
        // グリッドサイズも図面に合わせて自動
        if(dim<2000) state.snap=auto/4;          // 紙scale: 細かめ
        else if(dim<5000) state.snap=10;
        else if(dim<20000) state.snap=91;        // 半マス
        else state.snap=455;                     // 柱間
        toast(`${name} 読込: ${state.bgEntities.length} 図形 (${ms}ms) / 範囲 ${Math.round(ext.w)}×${Math.round(ext.h)}mm / 記号サイズ自動: ${state.symSize}mm`);
      } else {
        toast(`${name} を読込: ${state.bgEntities.length} 図形 (${ms}ms)`);
      }
    }
  }catch(err){
    toast('DXFパース失敗: '+err.message);
    console.error(err);
    state.bgEntities=[];
  }
  buildLayerPanel();buildSubpalette();fitView();
}

function computeExtent(ents){
  let xmin=Infinity,ymin=Infinity,xmax=-Infinity,ymax=-Infinity,n=0;
  const upd=(x,y)=>{n++;if(x<xmin)xmin=x;if(y<ymin)ymin=y;if(x>xmax)xmax=x;if(y>ymax)ymax=y;};
  for(const e of ents){
    if(e.type==='LINE'){upd(e.x1,e.y1);upd(e.x2,e.y2);}
    else if(e.type==='POLYLINE'){for(const p of e.points)upd(p.x,p.y);}
    else if(e.type==='CIRCLE'||e.type==='ARC'){upd(e.cx-e.r,e.cy-e.r);upd(e.cx+e.r,e.cy+e.r);}
    else if(e.type==='TEXT')upd(e.x,e.y);
  }
  if(n===0) return null;
  return {xmin,ymin,xmax,ymax,w:xmax-xmin,h:ymax-ymin};
}

/* PDF読込 (1ページ目を画像化して背景に) */
function loadPdfFile(f){
  if(!window.pdfjsLib){toast('PDF.jsの読込に失敗しました');return;}
  toast('PDFを変換中...');
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const pdf=await pdfjsLib.getDocument({data}).promise;
      const page=await pdf.getPage(1);
      // A3=420mm想定。スケールで解像度確保
      const viewport=page.getViewport({scale:2.0});
      const c=document.createElement('canvas');
      c.width=viewport.width;c.height=viewport.height;
      const cctx=c.getContext('2d');
      cctx.fillStyle='#fff';cctx.fillRect(0,0,c.width,c.height);
      await page.render({canvasContext:cctx,viewport}).promise;
      const img=new Image();
      img.onload=()=>{
        // 1点 = 1/72インチ = 25.4/72 mm ≈ 0.3528mm
        // viewport.scale=2なら1px = 0.1764mm
        const mmPerPx=25.4/72/2;
        const wMm=img.width*mmPerPx, hMm=img.height*mmPerPx;
        pushHistory();
        state.bgImage={
          img,
          x:0,y:0,         // 中心位置 (世界座標mm)
          w:wMm,h:hMm,
          opacity:0.7,
          name:f.name+' (1/'+pdf.numPages+'p)',
          locked:false,
        };
        toast(`${f.name} を読込 (${pdf.numPages}ページ中1ページ目)`);
        buildLayerPanel();buildSubpalette();fitView();
      };
      img.src=c.toDataURL('image/png');
    } catch(err){
      toast('PDF読込エラー: '+err.message);
    }
  };
  reader.readAsArrayBuffer(f);
}

/* 画像読込 (PNG/JPG/etc) */
function loadImageFile(f){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      // 画像はピクセル等倍ではなく、A3横の縦210mmを基準にスケーリング (適宜ユーザー側で調整)
      const baseMm=2000;  // 2m を初期サイズに
      const aspect=img.width/img.height;
      const wMm=aspect>=1?baseMm:baseMm*aspect;
      const hMm=aspect>=1?baseMm/aspect:baseMm;
      pushHistory();
      state.bgImage={img,x:0,y:0,w:wMm,h:hMm,opacity:0.7,name:f.name,locked:false};
      toast(`${f.name} を読込: ${img.width}×${img.height}px`);
      buildLayerPanel();buildSubpalette();fitView();
    };
    img.onerror=()=>toast('画像の読込に失敗しました');
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
}

document.getElementById('btnFit').onclick=fitView;
function fitView(){
  const all=[];
  for(const e of state.bgEntities){
    if(e.type==='LINE') all.push([e.x1,e.y1],[e.x2,e.y2]);
    else if(e.type==='POLYLINE') for(const p of e.points) all.push([p.x,p.y]);
    else if(e.type==='CIRCLE') all.push([e.cx-e.r,e.cy-e.r],[e.cx+e.r,e.cy+e.r]);
    else if(e.type==='ARC') all.push([e.cx-e.r,e.cy-e.r],[e.cx+e.r,e.cy+e.r]);
    else if(e.type==='TEXT') all.push([e.x,e.y]);
  }
  for(const s of state.symbols) all.push([s.x,s.y]);
  for(const w of state.wires) for(const p of w.points) all.push([p.x,p.y]);
  for(const h of state.homeruns) all.push([h.x,h.y]);
  if(state.bgImage){
    const b=state.bgImage;
    all.push([b.x-b.w/2,b.y-b.h/2],[b.x+b.w/2,b.y+b.h/2]);
  }
  if(all.length===0){state.view={ox:0,oy:0,scale:0.15};render();return;}
  let xmin=Infinity,ymin=Infinity,xmax=-Infinity,ymax=-Infinity;
  for(const [x,y] of all){xmin=Math.min(xmin,x);ymin=Math.min(ymin,y);xmax=Math.max(xmax,x);ymax=Math.max(ymax,y);}
  const bw=xmax-xmin,bh=ymax-ymin,margin=Math.max(bw,bh)*.12+1000;
  state.view.ox=(xmin+xmax)/2;state.view.oy=(ymin+ymax)/2;
  const aw=canvas.width/devicePixelRatio-80,ah=canvas.height/devicePixelRatio-80;
  state.view.scale=Math.min(aw/(bw+margin),ah/(bh+margin));
  if(!isFinite(state.view.scale)||state.view.scale<=0) state.view.scale=0.15;
  render();
}

function exportDxf(){
  const b=new DxfBuilder();
  for(const k in LAYERS) b.layer(k,LAYERS[k].dxfColor);
  // 背景
  for(const e of state.bgEntities){
    if(e.type==='LINE') b.line(e.x1,e.y1,e.x2,e.y2,'BG');
    else if(e.type==='POLYLINE'){
      for(let i=0;i<e.points.length-1;i++) b.line(e.points[i].x,e.points[i].y,e.points[i+1].x,e.points[i+1].y,'BG');
      if(e.closed&&e.points.length>2){const l=e.points.length-1;b.line(e.points[l].x,e.points[l].y,e.points[0].x,e.points[0].y,'BG');}
    }
    else if(e.type==='CIRCLE') b.circle(e.cx,e.cy,e.r,'BG');
    else if(e.type==='ARC') b.arc(e.cx,e.cy,e.r,e.startAngle||0,e.endAngle||360,'BG');
    else if(e.type==='TEXT') b.text(e.x,e.y,e.h||100,e.text,'BG');
  }
  // 記号: BLOCK定義 + INSERT 配置 (AutoCAD等で一括編集可能)
  const u=state.symSize/2;
  const usedTypes=new Set(state.symbols.map(s=>s.type));
  for(const t of usedTypes){
    const def=SYMBOLS[t];if(!def) continue;
    const blockName='SYM_'+t.toUpperCase().replace(/-/g,'_');
    b.startBlock(blockName);
    def.dxf(b,0,0,0,def.layer,u);  // 原点に定義
    b.endBlock();
  }
  for(const s of state.symbols){
    const def=SYMBOLS[s.type];if(!def) continue;
    const blockName='SYM_'+s.type.toUpperCase().replace(/-/g,'_');
    b.insert(blockName,s.x,s.y,s.rot,def.layer,1);
  }
  // 配線
  for(const w of state.wires){
    b.polyline(w.points,'E-WIRE',w.style==='dash');
    // 電線本数マーク (DXF: 斜め短線)
    const conductors=w.conductors||2;
    if(conductors>1){
      for(let i=0;i<w.points.length-1;i++){
        const p1=w.points[i],p2=w.points[i+1];
        const len=Math.hypot(p2.x-p1.x,p2.y-p1.y);
        if(len<30) continue;
        const dx=(p2.x-p1.x)/len,dy=(p2.y-p1.y)/len;
        const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
        const markLen=60,spacing=40;
        const total=(conductors-1)*spacing;
        for(let j=0;j<conductors;j++){
          const off=-total/2+j*spacing;
          const cx2=mx+dx*off,cy2=my+dy*off;
          b.line(cx2-dy*markLen-dx*markLen*.5,cy2+dx*markLen-dy*markLen*.5,
                 cx2+dy*markLen+dx*markLen*.5,cy2-dx*markLen+dy*markLen*.5,'E-WIRE');
        }
      }
    }
    if(w.circuit&&w.points.length>=2){
      const mid=Math.floor((w.points.length-1)/2);
      const pm=w.points[mid];
      b.text(pm.x,pm.y,80,w.circuit,'E-WIRE');
    }
  }
  // 引込
  for(const hr of state.homeruns){
    const u2=180;
    const tx=(dx,dy)=>{const[a,c]=rot2(dx,dy,hr.rot);return[hr.x+a,hr.y+c];};
    let p1=tx(-u2*.8,0),p2=tx(u2*.8,0);
    b.line(p1[0],p1[1],p2[0],p2[1],'E-HOME');
    p1=tx(u2*.4,u2*.35);p2=tx(u2*.8,0);const p3=tx(u2*.4,-u2*.35);
    b.line(p1[0],p1[1],p2[0],p2[1],'E-HOME');b.line(p2[0],p2[1],p3[0],p3[1],'E-HOME');
    p1=tx(-u2*.8,-u2*.22);p2=tx(-u2*.8,u2*.22);
    b.line(p1[0],p1[1],p2[0],p2[1],'E-HOME');
    if(hr.circuit){const tp=tx(0,u2*.3);b.text(tp[0],tp[1],80,hr.circuit,'E-HOME');}
  }
  // 注記
  for(const t of state.texts) b.text(t.x,t.y,t.height*.7,t.text,'E-TEXT');

  download('electrical-plan.dxf',b.build(),'application/dxf');
  toast('DXF を出力しました');
}

function exportPdf(){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a3'});
  pdf.setFont('helvetica','bold');pdf.setFontSize(13);
  pdf.text('住宅電気図面',20,16);
  pdf.setFont('helvetica','normal');pdf.setFontSize(8);
  pdf.text('JIS C 0303  '+new Date().toLocaleDateString('ja-JP'),20,22);

  const px=25,py=28,pw=370,ph=235;
  pdf.setDrawColor(80);pdf.setLineWidth(0.3);pdf.rect(px,py,pw,ph);

  const all=[];
  for(const e of state.bgEntities){
    if(e.type==='LINE') all.push([e.x1,e.y1],[e.x2,e.y2]);
    else if(e.type==='POLYLINE') for(const p of e.points) all.push([p.x,p.y]);
    else if(e.type==='CIRCLE') all.push([e.cx-e.r,e.cy-e.r],[e.cx+e.r,e.cy+e.r]);
  }
  for(const s of state.symbols) all.push([s.x-state.symSize,s.y-state.symSize],[s.x+state.symSize,s.y+state.symSize]);
  for(const w of state.wires) for(const pt of w.points) all.push([pt.x,pt.y]);
  for(const hr of state.homeruns) all.push([hr.x,hr.y]);

  if(all.length===0){pdf.text('(図面が空です)',px+10,py+20);}
  else{
    let xmin=Infinity,ymin=Infinity,xmax=-Infinity,ymax=-Infinity;
    for(const [x,y] of all){xmin=Math.min(xmin,x);ymin=Math.min(ymin,y);xmax=Math.max(xmax,x);ymax=Math.max(ymax,y);}
    const w0=xmax-xmin||1,h0=ymax-ymin||1;
    const sc=Math.min(pw/w0,ph/h0)*.92;
    const cx2=px+pw/2,cy2=py+ph/2;
    const tx=x=>cx2+(x-(xmin+xmax)/2)*sc;
    const ty=y=>cy2-(y-(ymin+ymax)/2)*sc;

    // 背景
    pdf.setLineWidth(0.08);pdf.setDrawColor(45,91,142);
    for(const e of state.bgEntities){
      if(e.type==='LINE') pdf.line(tx(e.x1),ty(e.y1),tx(e.x2),ty(e.y2));
      else if(e.type==='POLYLINE'){
        for(let i=0;i<e.points.length-1;i++) pdf.line(tx(e.points[i].x),ty(e.points[i].y),tx(e.points[i+1].x),ty(e.points[i+1].y));
      }
      else if(e.type==='CIRCLE') pdf.circle(tx(e.cx),ty(e.cy),e.r*sc);
    }
    // 配線
    pdf.setDrawColor(26,35,50);pdf.setLineWidth(0.22);
    for(const w of state.wires){
      if(w.style==='dash') pdf.setLineDashPattern([1.2,0.8],0);
      for(let i=0;i<w.points.length-1;i++) pdf.line(tx(w.points[i].x),ty(w.points[i].y),tx(w.points[i+1].x),ty(w.points[i+1].y));
      pdf.setLineDashPattern([],0);
      // 電線本数マーク
      const conductors=w.conductors||2;
      if(conductors>1){
        for(let i=0;i<w.points.length-1;i++){
          const p1={x:tx(w.points[i].x),y:ty(w.points[i].y)};
          const p2={x:tx(w.points[i+1].x),y:ty(w.points[i+1].y)};
          const len=Math.hypot(p2.x-p1.x,p2.y-p1.y);
          if(len<5) continue;
          const dx2=(p2.x-p1.x)/len,dy2=(p2.y-p1.y)/len;
          const mx2=(p1.x+p2.x)/2,my2=(p1.y+p2.y)/2;
          const ml=2.5,sp2=1.5,tot=(conductors-1)*sp2;
          for(let j=0;j<conductors;j++){
            const off=-tot/2+j*sp2;
            const cx3=mx2+dx2*off,cy3=my2+dy2*off;
            pdf.line(cx3-dy2*ml-dx2*ml*.5,cy3+dx2*ml-dy2*ml*.5,cx3+dy2*ml+dx2*ml*.5,cy3-dx2*ml+dy2*ml*.5);
          }
        }
      }
    }
    // 記号 (DXFビルダ経由でPDF描画)
    pdf.setLineWidth(0.18);
    for(const s of state.symbols){
      const def=SYMBOLS[s.type];if(!def) continue;
      const u=state.symSize/2;
      const lc=LAYERS[def.layer].color;
      const c=hex2rgb(lc);
      pdf.setDrawColor(c.r,c.g,c.b);pdf.setFillColor(c.r,c.g,c.b);
      const tb=new DxfBuilder();
      def.dxf(tb,s.x,s.y,s.rot,def.layer,u);
      for(const ent of tb.entities){
        const lines2=ent.split('\n');
        const code=lines2[1];
        const m=parseDxfEnt(ent);
        if(code==='LINE') pdf.line(tx(parseFloat(m[10])),ty(parseFloat(m[20])),tx(parseFloat(m[11])),ty(parseFloat(m[21])));
        else if(code==='CIRCLE') pdf.circle(tx(parseFloat(m[10])),ty(parseFloat(m[20])),parseFloat(m[40])*sc);
        else if(code==='TEXT'){
          pdf.setFontSize(Math.max(5,parseFloat(m[40])*sc*2.6));
          pdf.text(m[1]||'',tx(parseFloat(m[10])),ty(parseFloat(m[20])));
        }
      }
    }
    // 注記
    pdf.setDrawColor(26,35,50);pdf.setTextColor(26,35,50);
    for(const t of state.texts){
      pdf.setFontSize(Math.max(5,t.height*sc*2.4));
      pdf.text(t.text||'',tx(t.x),ty(t.y));
    }
  }
  // 凡例フッタ
  pdf.setFontSize(7);pdf.setTextColor(80);
  pdf.text(`記号:${state.symbols.length}  配線:${state.wires.length}  引込:${state.homeruns.length}  注記:${state.texts.length}`,px+pw-100,py+ph+8);
  pdf.save('electrical-plan.pdf');
  toast('PDF を出力しました');
}

function parseDxfEnt(s){
  const lines2=s.split('\n'),m={};
  for(let i=0;i<lines2.length-1;i+=2){
    const c=lines2[i].trim();
    if(c==='0'||c==='2'||c==='8'||c==='1'){m[c]=lines2[i+1];continue;}
    m[parseInt(c,10)]=lines2[i+1];
  }
  return m;
}
function hex2rgb(h){const m=h.replace('#','');return{r:parseInt(m.substr(0,2),16),g:parseInt(m.substr(2,2),16),b:parseInt(m.substr(4,2),16)};}
function download(filename,content,type){
  const blob=new Blob([content],{type:type||'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),200);
}
function toast(msg){
  let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
  document.getElementById('stat-msg').textContent=msg;
}

/* ---- 14. UI同期 ---- */
function updateStats(){
  const eq=state.view.scale;
  const ratio=Math.round(1/eq);
  if(isFinite(ratio)&&ratio>0) document.getElementById('stat-scale').textContent='1:'+ratio;
  document.getElementById('stat-zoom').textContent=Math.round(eq*100*6.67)+'%';
  document.getElementById('info-counts').textContent=`S:${state.symbols.length} W:${state.wires.length} HR:${state.homeruns.length}`;
}

function updateSelectionPanel(){
  const p=document.getElementById('selectionPanel');
  if(state.selected.size===0){p.textContent='何も選択されていません';return;}
  const ids=[...state.selected];
  if(ids.length===1){
    const id=ids[0];
    const sym=state.symbols.find(s=>s.id===id);
    const w=state.wires.find(w=>w.id===id);
    const t=state.texts.find(t=>t.id===id);
    const hr=state.homeruns.find(h=>h.id===id);
    if(sym){
      const def=SYMBOLS[sym.type];
      p.innerHTML=`<b>${def?.name||sym.type}</b><br>座標: ${Math.round(sym.x)}, ${Math.round(sym.y)} mm<br>回転: ${Math.round(sym.rot*180/Math.PI)}°<br>レイヤ: ${def?.layer||'-'}`;
    } else if(w){
      const len=w.points.reduce((s,pt,i)=>i?s+Math.hypot(pt.x-w.points[i-1].x,pt.y-w.points[i-1].y):0,0);
      p.innerHTML=`<b>配線(${w.style==='dash'?'隠蔽':'露出'})</b><br>頂点数: ${w.points.length}<br>全長: ${Math.round(len)} mm<br>電線本数: ${w.conductors||2}本<br>回路番号: ${w.circuit||'—'}`;
    } else if(hr){
      p.innerHTML=`<b>引込(ホームラン)</b><br>座標: ${Math.round(hr.x)}, ${Math.round(hr.y)} mm<br>回路番号: ${hr.circuit||'—'}`;
    } else if(t){
      p.innerHTML=`<b>注記</b><br>テキスト: ${t.text}<br>座標: ${Math.round(t.x)}, ${Math.round(t.y)} mm`;
    } else {p.textContent='不明';}
  } else {
    p.textContent=`${ids.length} 要素を選択中`;
  }
}

/* ---- 15. 起動 ---- */
selectCategory('outlet');
selectTool('select');
pushHistory();
// レイアウト確定後にキャンバスサイズを確定
requestAnimationFrame(()=>{requestAnimationFrame(()=>{resizeCanvas();render();});});
setTimeout(()=>toast('DXF読込ボタンから平面図を読み込んで電気記号を配置してください'),200);
</script>
