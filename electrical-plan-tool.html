<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>住宅電気図面CADシステム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}</script>
<style>
:root{
  --title-bg:#3a4150;--menu-bg:#ebebeb;--tb-bg:#d9d9d9;--tb-border:#9a9a9a;
  --cat-bg:#c4c4c4;--cat-active:#f0ede4;--accent:#cc6633;--canvas-bg:#f4f4ee;
  --grid:#a4b4d4;--ink:#1a1a1a;--ink-soft:#555;--btn-face:#e6e6e6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"Meiryo UI","Yu Gothic UI","Hiragino Kaku Gothic ProN",sans-serif;background:var(--menu-bg);color:var(--ink);font-size:12px;user-select:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

#app{
  display:grid;
  grid-template-columns:204px 1fr 38px;
  grid-template-rows:22px 22px 32px 28px 56px 1fr 22px;
  grid-template-areas:
    "title  title  title"
    "menu   menu   menu"
    "tb1    tb1    tb1"
    "tb2    tb2    tb2"
    "cat    cat    cat"
    "sub    canvas right"
    "status status status";
  height:100vh;
}

/* Title bar */
#titlebar{grid-area:title;background:var(--title-bg);color:#fff;display:flex;align-items:center;padding:0 8px;font-size:11px;letter-spacing:.03em}
#titlebar .ico{width:12px;height:12px;background:var(--accent);margin-right:6px;clip-path:polygon(20% 0,100% 50%,20% 100%,0 50%)}
#titlebar b{color:#ffd9b3;font-weight:normal;margin:0 4px}
#titlebar .winctrl{margin-left:auto;display:flex}
#titlebar .winctrl button{width:26px;height:22px;color:#fff;font-size:11px;font-family:"MS Gothic",monospace}
#titlebar .winctrl button:hover{background:rgba(255,255,255,.12)}
#titlebar .winctrl button:last-child:hover{background:#c33}

/* Menu bar */
#menubar{grid-area:menu;background:var(--menu-bg);display:flex;align-items:center;padding:0 4px;border-bottom:1px solid var(--tb-border);font-size:12px}
#menubar>span{padding:2px 9px;cursor:default;color:#222}
#menubar>span:hover{background:#3399ff;color:#fff}
#menubar u{text-decoration:underline}

/* Toolbars */
#toolbar1,#toolbar2{background:var(--tb-bg);display:flex;align-items:center;padding:2px 4px;gap:2px;border-bottom:1px solid var(--tb-border)}
#toolbar1{grid-area:tb1}
#toolbar2{grid-area:tb2}

.tb-icon{
  height:26px;min-width:26px;padding:0 4px;
  border:1px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#333;border-radius:1px;
}
.tb-icon:hover{background:#fff;border-color:#888}
.tb-icon.act{background:#fff;border:1px solid #555;box-shadow:inset 1px 1px 2px rgba(0,0,0,.15)}
.tb-icon.export{background:#fff;color:var(--accent);border:1px solid #999;font-weight:bold;font-size:10px;padding:0 6px}
.tb-icon.export:hover{background:#fff8f0;border-color:var(--accent)}

.tb-sep{width:1px;height:20px;background:#999;margin:0 2px}

.tb-tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:24px;height:26px;border:1px solid transparent;
  font-size:10px;line-height:1.0;letter-spacing:-.05em;color:#222;
}
.tb-tab:hover{background:#fff;border-color:#888}
.tb-tab span{font-size:10px;display:block}

.tb-select{height:22px;border:1px solid #777;background:#fff;font-size:11px;padding:0 4px;font-family:"Meiryo UI",sans-serif}
.tb-search{display:flex;align-items:center;background:#fff;border:1px solid #777;height:22px;width:200px;margin-left:auto}
.tb-search input{border:0;outline:0;padding:0 6px;font-size:11px;height:100%;flex:1;font-family:inherit;color:#666}
.tb-search button{padding:0 6px;height:100%;color:#666}

#info-counts{font-size:10px;color:#444;margin-left:8px;font-family:"Consolas",monospace}

/* Category tabs (large horizontal) */
#cattabs{
  grid-area:cat;background:var(--cat-bg);
  display:flex;border-bottom:1px solid #777;
  overflow-x:auto;padding:0;
}
#cattabs::-webkit-scrollbar{height:5px}
.cat-tab{
  flex:0 0 auto;width:62px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:2px;padding:4px 0 2px;
  border-right:1px solid #aaa;
  background:linear-gradient(to bottom,#dcdcdc 0%,#bcbcbc 100%);
  position:relative;
}
.cat-tab:hover{background:linear-gradient(to bottom,#e8e8e8 0%,#c8c8c8 100%)}
.cat-tab.active{
  background:linear-gradient(to bottom,#f4f4ee 0%,#e8e6dc 100%);
  border-bottom:3px solid var(--accent);
}
.cat-tab .ci{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:1px solid #888;border-radius:2px;
}
.cat-tab .ci svg{width:24px;height:24px}
.cat-tab .cn{font-size:10px;color:#222;letter-spacing:-.04em}
.cat-tab.active .cn{color:#993322;font-weight:bold}
.cat-tab .arr{position:absolute;bottom:0;font-size:6px;color:#888}

/* Sub-palette (left, filtered by active category) */
#subpalette{
  grid-area:sub;background:var(--menu-bg);
  border-right:1px solid var(--tb-border);
  overflow-y:auto;padding:0;
}
#subpalette::-webkit-scrollbar{width:8px}
#subpalette::-webkit-scrollbar-thumb{background:#aaa;border:1px solid #888}

.sub-title{
  font-size:10px;color:#fff;
  background:linear-gradient(to bottom,#5a6577,#3d4654);
  padding:3px 8px;letter-spacing:.05em;
  border-bottom:1px solid #2a3140;
}
.sym-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:2px;padding:3px;
}
.sym-btn{
  aspect-ratio:1;background:#fff;
  border:1px solid #b0b0b0;border-radius:1px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:2px;
}
.sym-btn:hover{border-color:var(--accent);background:#fff8f0}
.sym-btn.active{
  background:var(--accent);border-color:#993322;
  box-shadow:inset 1px 1px 3px rgba(0,0,0,.3);
}
.sym-btn.active .sym-icon path,
.sym-btn.active .sym-icon line,
.sym-btn.active .sym-icon circle,
.sym-btn.active .sym-icon rect,
.sym-btn.active .sym-icon polyline{stroke:#fff}
.sym-btn.active .sfill{fill:#fff!important}
.sym-btn.active .stext{fill:#fff!important}
.sym-btn.active .sym-label{color:#fff}
.sym-icon{width:26px;height:26px}
.sym-icon path,.sym-icon line,.sym-icon circle,.sym-icon rect,.sym-icon polyline{stroke:var(--ink);fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
.sfill{fill:var(--ink);stroke:none!important}
.stext{fill:var(--ink);font-family:monospace;font-size:5px;stroke:none!important}
.sym-label{font-size:8px;color:#333;text-align:center;line-height:1.0;letter-spacing:-.04em}

/* Property sections inside subpalette */
.prop-section{background:#fff;border:1px solid #b8b8b8;margin:5px 4px;padding:5px 6px}
.prop-section h4{font-size:10px;color:#333;letter-spacing:.04em;margin-bottom:4px;border-bottom:1px dashed #ccc;padding-bottom:2px;font-weight:normal;background:#eee;padding:2px 4px;margin:-5px -6px 4px}
.tool-row{display:flex;flex-direction:column;gap:2px}
.tool-btn{padding:4px 6px;font-size:10px;border:1px solid #999;background:#fff;text-align:left;display:flex;align-items:center;gap:4px}
.tool-btn:hover{background:#fff8f0;border-color:var(--accent)}
.tool-btn.active{background:var(--accent);color:#fff;border-color:#993322}
.tool-btn .key{font-family:monospace;font-size:8px;margin-left:auto;opacity:.6;border:1px solid currentColor;padding:0 3px;border-radius:1px}
.prop-row{display:flex;align-items:center;gap:4px;font-size:10px;margin-bottom:3px}
.prop-row label{width:54px;color:#444;font-size:10px}
.prop-row input,.prop-row select{flex:1;height:18px;border:1px solid #888;background:#fff;font-family:"Consolas",monospace;font-size:10px;padding:0 4px;color:#222}
.prop-row input:focus,.prop-row select:focus{outline:none;border-color:var(--accent)}
#cond-row{display:flex;gap:1px;margin-bottom:4px}
.cond-btn{flex:1;padding:3px 0;font-size:9px;font-family:monospace;border:1px solid #888;background:#fff;text-align:center}
.cond-btn:hover{background:#fff8f0}
.cond-btn.active{background:var(--accent);color:#fff;border-color:#993322}

.layer-row{display:flex;align-items:center;padding:2px 0;gap:4px;font-size:10px;cursor:pointer}
.layer-row .swatch{width:10px;height:10px;border:1px solid #333}
.layer-row .name{flex:1}
.layer-row .count{font-family:monospace;font-size:8px;color:#666}
.layer-row.hidden .name,.layer-row.hidden .count{opacity:.3;text-decoration:line-through}

/* Canvas stage */
#stage{grid-area:canvas;position:relative;background:var(--canvas-bg);overflow:hidden;border-right:1px solid #aaa}
#canvas{display:block;cursor:crosshair}
#stage.pan #canvas{cursor:grab}
#stage.panning #canvas{cursor:grabbing}
#crosshair-info{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;font-size:10px;font-family:monospace;border-radius:2px;pointer-events:none}
#tool-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#3a4150;color:#fff;padding:4px 14px;font-size:11px;border-left:3px solid var(--accent);pointer-events:none;opacity:0;transition:opacity .2s}
#tool-hint.show{opacity:1}
#tool-hint b{color:#ffaa66;font-weight:normal}

/* Right panel (vertical icon column) */
#rightpanel{
  grid-area:right;background:var(--tb-bg);
  display:flex;flex-direction:column;align-items:center;
  padding:2px;gap:1px;overflow-y:auto;
}
#rightpanel::-webkit-scrollbar{width:5px}
.side-btn{
  width:34px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3px 0;font-size:8px;
  background:#fff;border:1px solid #b0b0b0;border-radius:1px;
  color:#333;
}
.side-btn:hover{background:#fff8f0;border-color:var(--accent)}
.side-btn.active{background:var(--accent);color:#fff;border-color:#993322}
.side-btn .si{font-size:13px;line-height:1.0;margin-bottom:1px;font-weight:bold}
.side-btn .sl{font-size:8px;line-height:1.0;letter-spacing:-.05em}

/* Status bar */
#statusbar{
  grid-area:status;background:var(--tb-bg);
  border-top:1px solid var(--tb-border);
  display:flex;align-items:center;
  font-size:10px;color:#222;
}
#statusbar .stat-cmd{background:#3a4150;color:#fff;padding:0 10px;height:100%;display:flex;align-items:center;font-size:10px;min-width:280px}
#statusbar .stat{padding:0 10px;border-right:1px solid #999;height:100%;display:flex;align-items:center;gap:4px}
#statusbar .stat b{font-weight:normal;color:var(--accent);font-family:"Consolas",monospace}
#statusbar .floor{padding:0 10px;background:#e0e0e0;border-right:1px solid #999;height:100%;display:flex;align-items:center;gap:4px;font-size:10px}

#fileInput{display:none}
.toast{position:fixed;top:90px;right:16px;background:#3a4150;color:#fff;padding:8px 14px;font-size:11px;letter-spacing:.05em;border-left:3px solid var(--accent);z-index:100;opacity:0;transform:translateX(14px);transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(0)}

/* Hidden categories collapse */
.cat.hidden{display:none}
.cat-head-pill{display:none}
</style>
</head>
<body>
<div id="app">

<!-- ===== Title bar ===== -->
<div id="titlebar">
  <span class="ico"></span>
  <span>住宅電気図面CAD 64bit Version 1.0 - <b>新規物件_001</b> &lt;1階 平面図&gt;</span>
  <div class="winctrl">
    <button title="最小化">－</button>
    <button title="最大化">□</button>
    <button title="閉じる">×</button>
  </div>
</div>

<!-- ===== Menu bar ===== -->
<div id="menubar">
  <span>ファイル(<u>F</u>)</span>
  <span>物件(<u>B</u>)</span>
  <span>編集(<u>E</u>)</span>
  <span>表示(<u>D</u>)</span>
  <span>ツール(<u>T</u>)</span>
  <span>属性(<u>A</u>)</span>
  <span>読み込み(<u>R</u>)</span>
  <span>設定(<u>S</u>)</span>
  <span>ウィンドウ(<u>W</u>)</span>
  <span>ヘルプ(<u>H</u>)</span>
</div>

<!-- ===== Toolbar 1 ===== -->
<div id="toolbar1">
  <button class="tb-icon" id="btnLoadDxf" title="DXF / PDF / 画像 読込" style="background:#cc6633;color:#fff;border:1px solid #993322;padding:0 10px;font-weight:bold;font-size:11px;letter-spacing:.05em">📂 読込</button>
  <button class="tb-icon" title="保存">💾</button>
  <button class="tb-icon" title="設定">⚙</button>
  <button class="tb-icon" title="記号管理"><b>M</b></button>
  <button class="tb-icon" title="3D">3D</button>
  <button class="tb-icon" title="部材">部</button>
  <span class="tb-sep"></span>
  <button class="tb-tab" title="仕様"><span>仕</span><span>様</span></button>
  <button class="tb-tab" title="整合"><span>整</span><span>合</span></button>
  <button class="tb-tab" title="申請"><span>申</span><span>請</span></button>
  <button class="tb-tab" title="ナビ"><span>ナ</span><span>ビ</span></button>
  <span class="tb-sep"></span>
  <button class="tb-icon" title="拡大">🔍</button>
  <button class="tb-icon" title="縮小">🔎</button>
  <button class="tb-icon" id="btnFit" title="全体表示">⊡</button>
  <button class="tb-icon" title="再描画">↻</button>
  <span class="tb-sep"></span>
  <button class="tb-icon" id="btnUndo" title="元に戻す">↶</button>
  <button class="tb-icon" id="btnRedo" title="やり直し">↷</button>
  <span class="tb-sep"></span>
  <button class="tb-icon" id="btnClear" title="全削除">🗑</button>
  <button class="tb-icon" title="印刷">🖨</button>
  <div class="tb-search">
    <input type="text" placeholder="検索ワードを入力してください">
    <button>🔍</button>
  </div>
  <input type="file" id="fileInput" accept=".dxf,.DXF,.pdf,.PDF,.png,.jpg,.jpeg,.webp,.bmp,.gif">
</div>

<!-- ===== Toolbar 2 (properties + export) ===== -->
<div id="toolbar2">
  <button class="tb-icon" title="表示">▣</button>
  <select class="tb-select" style="width:128px"><option>001 データ 001</option></select>
  <select class="tb-select" style="width:80px"><option>線幅 1</option></select>
  <select class="tb-select" style="width:60px"><option>P.3</option></select>
  <span class="tb-sep"></span>
  <button class="tb-icon" title="グリップ">⊕</button>
  <button class="tb-icon" title="角度">∠</button>
  <button class="tb-icon" title="頂点">·</button>
  <button class="tb-icon" title="中点">┃</button>
  <button class="tb-icon" title="交点">×</button>
  <button class="tb-icon" title="円中心">○</button>
  <span class="tb-sep"></span>
  <button class="tb-icon export" id="btnExportDxf" title="DXF出力">DXF</button>
  <button class="tb-icon export" id="btnExportPdf" title="PDF出力">PDF</button>
  <button class="tb-icon export" id="btnExportPng" title="PNG出力">PNG</button>
  <span id="info-counts">SYMBOLS:0 / WIRES:0</span>
</div>

<!-- ===== Category tabs (large) ===== -->
<div id="cattabs">
  <button class="cat-tab" data-cat="auto" title="自動配置">
    <div class="ci"><svg viewBox="-12 -12 24 24"><path d="M-3 -8 L3 0 L-3 0 L3 8" fill="none" stroke="#cc6633" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="cn">自動</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab active" data-cat="outlet" title="コンセント">
    <div class="ci"><svg viewBox="-12 -12 24 24"><path d="M-8 0 A8 8 0 0 0 8 0 L-8 0 Z" fill="none" stroke="#1a1a1a" stroke-width="1.4"/><line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="1.2"/></svg></div>
    <div class="cn">ｺﾝｾﾝﾄ</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="switch" title="スイッチ">
    <div class="ci"><svg viewBox="-12 -12 24 24"><circle cx="0" cy="0" r="5" fill="#1a1a1a"/></svg></div>
    <div class="cn">ｽｲｯﾁ</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="light" title="照明器具">
    <div class="ci"><svg viewBox="-12 -12 24 24"><circle cx="0" cy="0" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.4"/><line x1="-5" y1="-5" x2="5" y2="5" stroke="#1a1a1a" stroke-width="1.4"/><line x1="-5" y1="5" x2="5" y2="-5" stroke="#1a1a1a" stroke-width="1.4"/></svg></div>
    <div class="cn">照明</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="weak" title="弱電・通信">
    <div class="ci"><svg viewBox="-12 -12 24 24"><circle cx="0" cy="0" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.4"/><text x="0" y="3" text-anchor="middle" font-size="8" fill="#1a1a1a">T</text></svg></div>
    <div class="cn">弱電</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="panel" title="盤・換気">
    <div class="ci"><svg viewBox="-12 -12 24 24"><rect x="-9" y="-5" width="18" height="10" fill="none" stroke="#1a1a1a" stroke-width="1.3"/><line x1="-6" y1="-5" x2="-3" y2="5" stroke="#1a1a1a" stroke-width="0.8"/><line x1="-3" y1="-5" x2="0" y2="5" stroke="#1a1a1a" stroke-width="0.8"/><line x1="0" y1="-5" x2="3" y2="5" stroke="#1a1a1a" stroke-width="0.8"/><line x1="3" y1="-5" x2="6" y2="5" stroke="#1a1a1a" stroke-width="0.8"/></svg></div>
    <div class="cn">盤・換気</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="wire" title="配線">
    <div class="ci"><svg viewBox="-12 -12 24 24"><path d="M-9 6 L-9 -2 L9 -2 L9 6" fill="none" stroke="#cc6633" stroke-width="1.6"/></svg></div>
    <div class="cn">配線</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="homerun" title="引込(ホームラン)">
    <div class="ci"><svg viewBox="-12 -12 24 24"><path d="M-8 6 L4 -6" stroke="#1a1a1a" stroke-width="1.4" fill="none"/><path d="M4 -6 L0 -3 M4 -6 L1 -7" stroke="#1a1a1a" stroke-width="1.4" fill="none"/></svg></div>
    <div class="cn">引込</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="text" title="文字注記">
    <div class="ci"><svg viewBox="-12 -12 24 24"><text x="0" y="6" text-anchor="middle" font-size="16" fill="#1a1a1a" font-family="serif" font-weight="bold">字</text></svg></div>
    <div class="cn">文字</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="check" title="チェック">
    <div class="ci"><svg viewBox="-12 -12 24 24"><path d="M-7 1 L-2 6 L8 -6" fill="none" stroke="#cc6633" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="cn">ﾁｪｯｸ</div><span class="arr">▾</span>
  </button>
  <button class="cat-tab" data-cat="output" title="出力">
    <div class="ci"><svg viewBox="-12 -12 24 24"><path d="M0 -8 L0 4" stroke="#1a1a1a" stroke-width="1.6" fill="none"/><path d="M-4 0 L0 4 L4 0" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/><line x1="-7" y1="7" x2="7" y2="7" stroke="#1a1a1a" stroke-width="1.6"/></svg></div>
    <div class="cn">出力</div><span class="arr">▾</span>
  </button>
</div>

<!-- ===== Sub palette (left) ===== -->
<aside id="subpalette"></aside>

<!-- ===== Main canvas ===== -->
<main id="stage">
  <canvas id="canvas"></canvas>
  <div id="tool-hint"></div>
  <div id="crosshair-info">— mm</div>
</main>

<!-- ===== Right side icon column ===== -->
<aside id="rightpanel">
  <button class="side-btn" title="情報"><div class="si">ℹ</div><div class="sl">情報</div></button>
  <button class="side-btn" title="通り芯"><div class="si">┼</div><div class="sl">通芯</div></button>
  <button class="side-btn" title="補助点"><div class="si">·</div><div class="sl">補助</div></button>

<script>
/* ============================================================
 * 住宅電気図面CADシステム
 * JIS C 0303 準拠 / 直交配線 / 電線本数マーク / 3路・4路スイッチ
 * ============================================================ */

/* ---- 1. 状態 ---- */
const state = {
  bgEntities: [],
  symbols: [],   // {id, type, x, y, rot, layer}
  wires: [],     // {id, points:[{x,y}], style, conductors, circuit, layer}
  texts: [],     // {id, x, y, text, height, layer}
  homeruns: [],  // {id, x, y, rot, circuit, layer}
  selected: new Set(),
  tool: 'select',
  view: { ox:0, oy:0, scale:0.15 },
  drawingWire: null,
  orthoMode: 'H',   // 'H'|'V'|'free'
  conductors: 2,
  circuitNum: '',
  hover: { x:0, y:0 },
  dragging: null,
  panning: null,
  history: [],
  historyIdx: -1,
  symSize: 200,
  snap: 91,
  snapHint: null,    // {x,y,id} 記号スナップ表示用
  vertexDrag: null,  // {wireId, vertIdx, origPts} 頂点ドラッグ
  bgImage: null,     // {img, x, y, w, h, opacity, name}  画像/PDF背景
  hoverItem: null,
};

/* ---- 2. ユーティリティ ---- */
function uid(){ return 'i'+Math.random().toString(36).slice(2,9); }
function rot2(x,y,a){ const c=Math.cos(a),s=Math.sin(a); return [x*c-y*s, x*s+y*c]; }

/* ---- 3. DXFビルダ (BLOCK / INSERT 対応) ---- */
class DxfBuilder {
  constructor(){
    this.entities=[];
    this.blocks=new Map();   // name -> entities[]
    this.layers=new Map();
    this._target=this.entities;
  }
  layer(name,color){ if(!this.layers.has(name)) this.layers.set(name,color||7); }
  startBlock(name){
    if(!this.blocks.has(name)) this.blocks.set(name,[]);
    this._target=this.blocks.get(name);
  }
  endBlock(){ this._target=this.entities; }
  line(x1,y1,x2,y2,layer){
    this.layer(layer);
    this._target.push(`0\nLINE\n8\n${layer}\n10\n${x1.toFixed(3)}\n20\n${y1.toFixed(3)}\n11\n${x2.toFixed(3)}\n21\n${y2.toFixed(3)}`);
  }
  circle(cx,cy,r,layer){
    this.layer(layer);
    this._target.push(`0\nCIRCLE\n8\n${layer}\n10\n${cx.toFixed(3)}\n20\n${cy.toFixed(3)}\n40\n${r.toFixed(3)}`);
  }
  arc(cx,cy,r,a1,a2,layer){
    this.layer(layer);
    this._target.push(`0\nARC\n8\n${layer}\n10\n${cx.toFixed(3)}\n20\n${cy.toFixed(3)}\n40\n${r.toFixed(3)}\n50\n${a1.toFixed(3)}\n51\n${a2.toFixed(3)}`);
  }
  text(x,y,h,t,layer){
    this.layer(layer);
    const safe=String(t).replace(/\n/g,' ');
    this._target.push(`0\nTEXT\n8\n${layer}\n10\n${x.toFixed(3)}\n20\n${y.toFixed(3)}\n40\n${h.toFixed(3)}\n1\n${safe}`);
  }
  insert(blockName,x,y,rot,layer,scale){
    this.layer(layer);
    const ang=(rot||0)*180/Math.PI;
    const sc=scale||1;
    this._target.push(`0\nINSERT\n8\n${layer}\n2\n${blockName}\n10\n${x.toFixed(3)}\n20\n${y.toFixed(3)}\n50\n${ang.toFixed(3)}\n41\n${sc.toFixed(3)}\n42\n${sc.toFixed(3)}\n43\n${sc.toFixed(3)}`);
  }
  polyline(pts,layer,dashed){
    if(pts.length<2) return;
    for(let i=0;i<pts.length-1;i++){
      const p1=pts[i],p2=pts[i+1];
      if(!dashed){ this.line(p1.x,p1.y,p2.x,p2.y,layer); continue; }
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.hypot(dx,dy);
      let t=0,on=true;
      while(t<len){
        const t2=Math.min(t+(on?105:50),len);
        if(on) this.line(p1.x+dx*t/len,p1.y+dy*t/len,p1.x+dx*t2/len,p1.y+dy*t2/len,layer);
        t=t2; on=!on;
      }
    }
  }
  build(){
    let s='999\nJIS C 0303 Residential Electrical CAD\n';
    s+='0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1009\n9\n$INSUNITS\n70\n4\n0\nENDSEC\n';
    s+='0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n70\n'+this.layers.size+'\n';
    for(const [name,color] of this.layers)
      s+=`0\nLAYER\n2\n${name}\n70\n0\n62\n${color}\n6\nCONTINUOUS\n`;
    s+='0\nENDTAB\n0\nENDSEC\n';
    // BLOCKS section (ブロック定義 = AutoCADで一括編集可能)
    s+='0\nSECTION\n2\nBLOCKS\n';
    for(const [name,ents] of this.blocks){
      s+=`0\nBLOCK\n8\n0\n2\n${name}\n70\n0\n10\n0\n20\n0\n30\n0\n3\n${name}\n1\n\n`;
      for(const e of ents) s+=e+'\n';
      s+='0\nENDBLK\n8\n0\n';
    }
    s+='0\nENDSEC\n';
    s+='0\nSECTION\n2\nENTITIES\n';
    for(const e of this.entities) s+=e+'\n';
    s+='0\nENDSEC\n0\nEOF\n';
    return s;
  }
}

/* ---- 4. レイヤー ---- */
const LAYERS = {
  'BG':       { name:'背景(DXF)',  color:'#2d5b8e', dxfColor:5, visible:true },
  'E-OUTLET': { name:'コンセント', color:'#a83232', dxfColor:1, visible:true },
  'E-SWITCH': { name:'スイッチ',   color:'#6b3a9e', dxfColor:6, visible:true },
  'E-LIGHT':  { name:'照明器具',   color:'#c28000', dxfColor:2, visible:true },
  'E-WEAK':   { name:'弱電・通信', color:'#2e7d4a', dxfColor:3, visible:true },
  'E-PANEL':  { name:'盤・設備',   color:'#1a5a8e', dxfColor:5, visible:true },
  'E-WIRE':   { name:'配線',       color:'#1a2332', dxfColor:7, visible:true },
  'E-HOME':   { name:'引込線',     color:'#a83232', dxfColor:1, visible:true },
  'E-TEXT':   { name:'文字注記',   color:'#1a2332', dxfColor:7, visible:true },
};

/* ---- 5. 記号ライブラリ (JIS C 0303) ---- */
const CATEGORIES = [
  { id:'outlet', name:'コンセント' },
  { id:'switch', name:'スイッチ' },
  { id:'light',  name:'照明器具' },
  { id:'weak',   name:'弱電・通信' },
  { id:'panel',  name:'盤・設備' },
];

const SYMBOLS = {};

/* --- 共通描画ヘルパ --- */
function pLine(ctx,x1,y1,x2,y2){ ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); }
function pCircle(ctx,cx,cy,r,fill){
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  fill ? ctx.fill() : ctx.stroke();
}
function pArc(ctx,cx,cy,r,a1,a2){ ctx.beginPath();ctx.arc(cx,cy,r,a1,a2);ctx.stroke(); }
function pText(ctx,x,y,h,txt,anchor='center'){
  ctx.save();
  ctx.scale(1,-1);
  ctx.font=`${h*0.88}px "JetBrains Mono",monospace`;
  ctx.textAlign=anchor; ctx.textBaseline='middle';
  ctx.fillText(txt,x,-y);
  ctx.restore();
}

/* --- コンセント (JIS C 0303: D形半円, フラット側=壁面) --- */
function makeOutlet(id,name,suffix,opts={}){
  SYMBOLS[id]={
    id,name,cat:'outlet',layer:'E-OUTLET',color:1,
    paint(ctx,u){
      // D形半円: 上半円 (curved part 上, 直径=壁側)
      ctx.beginPath();
      ctx.arc(0,0,u*.5,0,Math.PI);
      ctx.closePath();
      ctx.stroke();
      // ラベル (半円内)
      if(suffix) pText(ctx,0,u*.22,u*.32,suffix);
      else if(opts.twoGang) pText(ctx,0,u*.22,u*.32,'2');
      // 接続線 (壁の反対側に伸びる: 配線接続用)
      if(opts.lead!==false) pLine(ctx,0,0,0,-u*.25);
    },
    dxf(b,x,y,rot,layer,u){
      const tx=(dx,dy)=>{const[a,c]=rot2(dx,dy,rot);return[x+a,y+c];};
      const ra=(rot||0)*180/Math.PI;
      // 半円弧
      b.arc(x,y,u*.5,ra,ra+180,layer);
      // 直径線 (D形のフラット辺)
      let p1=tx(-u*.5,0),p2=tx(u*.5,0);
      b.line(p1[0],p1[1],p2[0],p2[1],layer);
      // 接続棒
      if(opts.lead!==false){
        p1=tx(0,0);p2=tx(0,-u*.25);
        b.line(p1[0],p1[1],p2[0],p2[1],layer);
      }
      const lab=suffix||(opts.twoGang?'2':'');
      if(lab){const tp=tx(0,u*.22);b.text(tp[0]-u*.18,tp[1]-u*.1,u*.28,lab,layer);}
    },
    icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
      <path d="M-9 0 A9 9 0 0 0 9 0 L-9 0 Z"/>
      <line x1="0" y1="0" x2="0" y2="5"/>
      ${(suffix||opts.twoGang)?`<text class="stext" x="0" y="-3" text-anchor="middle" style="font-size:6px">${suffix||'2'}</text>`:''}
    </svg>`
  };
}
makeOutlet('out-1','一般コンセント',null);
makeOutlet('out-2g','2口コンセント',null,{twoGang:true});
makeOutlet('out-E','接地コンセント','E');
makeOutlet('out-EL','漏電遮断','EL');
makeOutlet('out-wp','防水コンセント','WP');
makeOutlet('out-200','200V','200');
makeOutlet('out-ac','エアコン用','AC');
makeOutlet('out-ref','冷蔵庫用','RF');
makeOutlet('out-floor','床コンセント','F');

/* --- スイッチ (JIS: 実線円●+壁方向線) --- */
function makeSwitch(id,name,mark,opts={}){
  const r = 0.32;
  SYMBOLS[id]={
    id,name,cat:'switch',layer:'E-SWITCH',color:6,
    paint(ctx,u){
      // 黒丸 (壁面取付点)
      ctx.save();
      ctx.fillStyle=ctx.strokeStyle;
      pCircle(ctx,0,0,u*r,true);
      ctx.restore();
      // 壁方向線 (右上方向)
      pLine(ctx,u*r,0,u*.85,0);
      // 3路/4路数字
      if(mark) pText(ctx,u*1.05,u*.05,u*.38,mark,'left');
      // 連スイッチ本数
      if(opts.gang>1) pText(ctx,-u*.7,u*.05,u*.38,String(opts.gang),'center');
    },
    dxf(b,x,y,rot,layer,u){
      b.circle(x,y,u*r,layer);
      const p1=rot2(u*r,0,rot),p2=rot2(u*.85,0,rot);
      b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
      if(mark){const tp=rot2(u*1.05,0,rot);b.text(x+tp[0],y+tp[1],u*.3,mark,layer);}
    },
    icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
      <circle class="sfill" cx="-2" cy="0" r="4"/>
      <line x1="2" y1="0" x2="9" y2="0"/>
      ${mark?`<text class="stext" x="10" y="1">${mark}</text>`:''}
      ${opts.gang>1?`<text class="stext" x="-12" y="1">${opts.gang}</text>`:''}
    </svg>`
  };
}
makeSwitch('sw-1','片切スイッチ',null);
makeSwitch('sw-2','2連スイッチ',null,{gang:2});
makeSwitch('sw-3','3連スイッチ',null,{gang:3});
makeSwitch('sw-3way','3路スイッチ','3');
makeSwitch('sw-4way','4路スイッチ','4');
makeSwitch('sw-dim','調光スイッチ','R');
makeSwitch('sw-pir','人感スイッチ','RAS');
makeSwitch('sw-pull','プルスイッチ','P');
makeSwitch('sw-key','確認表示灯','L');
makeSwitch('sw-timer','タイマースイッチ','T');

/* --- 照明器具 --- */
SYMBOLS['lt-ceiling']={
  id:'lt-ceiling',name:'シーリング',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){
    pCircle(ctx,0,0,u*.5);
    const a=u*.354;
    pLine(ctx,-a,-a,a,a); pLine(ctx,-a,a,a,-a);
  },
  dxf(b,x,y,rot,layer,u){
    b.circle(x,y,u*.5,layer);
    const a=u*.354;
    let p1=rot2(-a,-a,rot),p2=rot2(a,a,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
    p1=rot2(-a,a,rot);p2=rot2(a,-a,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
  },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <circle cx="0" cy="0" r="7"/>
    <line x1="-5" y1="-5" x2="5" y2="5"/>
    <line x1="-5" y1="5" x2="5" y2="-5"/>
  </svg>`
};

SYMBOLS['lt-down']={
  id:'lt-down',name:'ダウンライト',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){ pCircle(ctx,0,0,u*.5); pCircle(ctx,0,0,u*.22); },
  dxf(b,x,y,rot,layer,u){ b.circle(x,y,u*.5,layer); b.circle(x,y,u*.22,layer); },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <circle cx="0" cy="0" r="7"/><circle cx="0" cy="0" r="3"/>
  </svg>`
};

SYMBOLS['lt-pendant']={
  id:'lt-pendant',name:'ペンダント',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){
    pCircle(ctx,0,0,u*.5);
    pLine(ctx,0,u*.5,0,u*.85);
    ctx.save();ctx.fillStyle=ctx.strokeStyle;
    pCircle(ctx,0,u*.85,u*.1,true);ctx.restore();
  },
  dxf(b,x,y,rot,layer,u){
    b.circle(x,y,u*.5,layer);
    const p1=rot2(0,u*.5,rot),p2=rot2(0,u*.85,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
    const p3=rot2(0,u*.85,rot);b.circle(x+p3[0],y+p3[1],u*.1,layer);
  },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <circle cx="0" cy="0" r="7"/>
    <line x1="0" y1="7" x2="0" y2="11"/>
    <circle class="sfill" cx="0" cy="11" r="1.5"/>
  </svg>`
};

SYMBOLS['lt-bracket']={
  id:'lt-bracket',name:'ブラケット',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){
    pArc(ctx,0,0,u*.5,Math.PI,0);
    pLine(ctx,-u*.5,0,u*.5,0);
  },
  dxf(b,x,y,rot,layer,u){
    const ra=(rot*180/Math.PI);
    b.arc(x,y,u*.5,ra,ra+180,layer);
    const p1=rot2(-u*.5,0,rot),p2=rot2(u*.5,0,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
  },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <path d="M-7 0 A7 7 0 0 1 7 0"/>
    <line x1="-7" y1="0" x2="7" y2="0"/>
  </svg>`
};

SYMBOLS['lt-fluor']={
  id:'lt-fluor',name:'蛍光灯',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){
    ctx.beginPath();ctx.rect(-u*.9,-u*.18,u*1.8,u*.36);ctx.stroke();
    pLine(ctx,-u*.9,0,u*.9,0);
  },
  dxf(b,x,y,rot,layer,u){
    const corners=[[-u*.9,-u*.18],[u*.9,-u*.18],[u*.9,u*.18],[-u*.9,u*.18]];
    const tc=corners.map(([a,c])=>{const r=rot2(a,c,rot);return[x+r[0],y+r[1]];});
    for(let i=0;i<4;i++) b.line(tc[i][0],tc[i][1],tc[(i+1)%4][0],tc[(i+1)%4][1],layer);
    const p1=rot2(-u*.9,0,rot),p2=rot2(u*.9,0,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
  },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <rect x="-12" y="-3" width="24" height="6"/>
    <line x1="-12" y1="0" x2="12" y2="0"/>
  </svg>`
};

SYMBOLS['lt-foot']={
  id:'lt-foot',name:'フットライト',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){ pCircle(ctx,0,0,u*.42); pText(ctx,0,0,u*.32,'F'); },
  dxf(b,x,y,rot,layer,u){ b.circle(x,y,u*.42,layer); b.text(x,y,u*.28,'F',layer); },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <circle cx="0" cy="0" r="6"/>
    <text class="stext" x="0" y="2" text-anchor="middle">F</text>
  </svg>`
};

SYMBOLS['lt-hook']={
  id:'lt-hook',name:'引掛シーリング',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){
    // ひし形 (45°回転正方形) + ×
    const r=u*.42;
    ctx.beginPath();
    ctx.moveTo(0,r);ctx.lineTo(r,0);ctx.lineTo(0,-r);ctx.lineTo(-r,0);ctx.closePath();
    ctx.stroke();
    pLine(ctx,-r*.55,-r*.55,r*.55,r*.55);
    pLine(ctx,-r*.55,r*.55,r*.55,-r*.55);
  },
  dxf(b,x,y,rot,layer,u){
    const r=u*.42;
    const c=[[0,r],[r,0],[0,-r],[-r,0]];
    const tc=c.map(([a,cv])=>{const v=rot2(a,cv,rot);return[x+v[0],y+v[1]];});
    for(let i=0;i<4;i++) b.line(tc[i][0],tc[i][1],tc[(i+1)%4][0],tc[(i+1)%4][1],layer);
    let p1=rot2(-r*.55,-r*.55,rot),p2=rot2(r*.55,r*.55,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
    p1=rot2(-r*.55,r*.55,rot);p2=rot2(r*.55,-r*.55,rot);
    b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
  },
  icon:`<svg class="sym-icon" viewBox="-14 -14 28 28">
    <path d="M0 -7 L7 0 L0 7 L-7 0 Z"/>
    <line x1="-3.8" y1="-3.8" x2="3.8" y2="3.8"/>
    <line x1="-3.8" y1="3.8" x2="3.8" y2="-3.8"/>
  </svg>`
};

SYMBOLS['lt-spot']={
  id:'lt-spot',name:'スポットライト',cat:'light',layer:'E-LIGHT',color:2,
  paint(ctx,u){
    pCircle(ctx,0,0,u*.42);
    // 照射方向の三角
    ctx.beginPath();
    ctx.moveTo(u*.42,u*.25);ctx.lineTo(u*.42,-u*.25);ctx.lineTo(u*.85,0);ctx.closePath();ctx.stroke();
  },
  dxf(b,x,y,rot,layer,u){
    b.circle(x,y,u*.42,layer);
    const p1=rot2(u*.42,u*.25,rot),p2=rot2(u*.42,-u*.25,rot),p3=rot2(u*.85,0,rot);

function makeWeak(id,name,letter){
  SYMBOLS[id]={
    id,name,cat:'weak',layer:'E-WEAK',color:3,
    paint(ctx,u){
      pCircle(ctx,0,0,u*.5);

      pLine(ctx,0,-u*.5,0,-u*.65);

    dxf(b,x,y,rot,layer,u){
      b.circle(x,y,u*.5,layer);
      b.text(x,y,u*.38,letter,layer);
      const p1=rot2(-u*.45,-u*.65,rot),p2=rot2(u*.45,-u*.65,rot);
      b.line(x+p1[0],y+p1[1],x+p2[0],y+p2[1],layer);
      const p3=rot2(0,-u*.5,rot),p4=rot2(0,-u*.65,rot);

/* ---- 6. UI構築 ---- */
let activeCategory='outlet';

function buildSubpalette(){
  const sp=document.getElementById('subpalette');
  if(!sp) return;
  sp.innerHTML='';
  const cat=CATEGORIES.find(c=>c.id===activeCategory);
  const title=document.createElement('div');
  title.className='sub-title';
  title.textContent=cat?cat.name:({wire:'配線',homerun:'引込',text:'文字',auto:'自動配置',check:'チェック',output:'出力'}[activeCategory]||activeCategory);
  sp.appendChild(title);

  // カテゴリ別パレット
  if(activeCategory==='wire'){
    const ps=document.createElement('div');ps.className='prop-section';
    ps.innerHTML=`<h4>配線種類</h4>
      <div class="tool-row">
        <button class="tool-btn" data-tool="select">選択・移動・削除 <span class="key">V</span></button>
        <button class="tool-btn" data-tool="wire">配線(実線) <span class="key">W</span></button>
        <button class="tool-btn" data-tool="wire-dash">隠蔽配線(破線) <span class="key">H</span></button>
      </div>
      <div style="font-size:9px;color:#666;line-height:1.4;margin-top:4px;padding:4px;background:#f6f0e0;border-left:2px solid #cc6633">
        <b>編集操作:</b><br>
        ・配線をクリック → 選択 (橙色)<br>
        ・選択中の配線をドラッグ → 平行移動<br>
        ・頂点の□をドラッグ → 頂点移動<br>
        ・配線セグメントをダブルクリック → 頂点追加<br>
        ・右クリック → 即削除 (頂点も配線本体も)<br>
        ・選択して Del キー → 削除
      </div>`;
    sp.appendChild(ps);
    const cs=document.createElement('div');cs.className='prop-section';
    cs.innerHTML=`<h4>電線本数 (斜線マーク)</h4>
      <div id="cond-row">
        <button class="cond-btn" data-c="2">2本</button>
        <button class="cond-btn" data-c="3">3本</button>
        <button class="cond-btn" data-c="4">4本</button>
        <button class="cond-btn" data-c="5">5本</button>
      </div>
      <div class="prop-row"><label>回路番号</label><input type="text" id="circuitNum" placeholder="例: 1A" maxlength="6"></div>
      <div class="prop-row"><label>直交方向</label>
        <select id="orthoMode">
          <option value="H">水平→垂直</option>
          <option value="V">垂直→水平</option>
          <option value="free">自由</option>
        </select>
      </div>`;
    sp.appendChild(cs);
  } else if(activeCategory==='homerun'){
    const ps=document.createElement('div');ps.className='prop-section';
    ps.innerHTML=`<h4>引込(ホームラン)</h4>
      <div class="tool-row">
        <button class="tool-btn" data-tool="homerun">引込配置 <span class="key">M</span></button>
      </div>
      <div class="prop-row"><label>回路番号</label><input type="text" id="circuitNum" placeholder="例: 1A" maxlength="6"></div>`;
    sp.appendChild(ps);
  } else if(activeCategory==='text'){
    const ps=document.createElement('div');ps.className='prop-section';
    ps.innerHTML=`<h4>文字注記</h4>
      <div class="tool-row">
        <button class="tool-btn" data-tool="text">文字を配置 <span class="key">T</span></button>
      </div>`;
    sp.appendChild(ps);
  } else if(activeCategory==='auto'){
    const ps=document.createElement('div');ps.className='prop-section';
    ps.innerHTML=`<h4>自動配置</h4>
      <div style="font-size:10px;color:#555;line-height:1.5">
        部屋を認識して標準的な電気記号を自動配置します。<br>
        <i>(プレースホルダ機能)</i>
      </div>`;

  } else if(activeCategory==='check'){

      <div style="font-size:10px;color:#555;line-height:1.5">
        ・スイッチに対する照明の対応<br>
        ・回路あたりのコンセント数<br>
        ・引込の有無<br>
        <i>(プレースホルダ機能)</i>
      </div>`;
    sp.appendChild(ps);

  if(state.bgImage){

      <div class="tool-row" style="margin-top:4px">
        <button class="tool-btn" id="btnBgFit">画像基準で再フィット</button>
        <button class="tool-btn" id="btnBgClear" style="color:#a44">背景を削除</button>
      </div>
      <div style="font-size:9px;color:#666;margin-top:4px;line-height:1.4;padding:4px;background:#f6f0e0;border-left:2px solid #cc6633">
        2点間の実寸が分かる場合は幅/高さを実寸で入れてキャリブレーションできます。
      </div>`;
    sp.appendChild(bg);
  }

  // 選択中
  const sel=document.createElement('div');sel.className='prop-section';
  sel.innerHTML=`<h4>選択中</h4>
    <div id="selectionPanel" style="font-size:10px;color:#555;line-height:1.5">何も選択されていません</div>`;
  sp.appendChild(sel);

  // 表示設定
  const disp=document.createElement('div');disp.className='prop-section';
  disp.innerHTML=`<h4>表示</h4>
    <div class="prop-row"><label>記号サイズ</label><input type="number" id="symSize" value="${state.symSize}" step="10" min="50" max="1000"></div>
    <div class="prop-row"><label>グリッド</label>
      <select id="snapSize">
        <option value="0">なし</option>
        <option value="50">50mm</option>
        <option value="91" ${state.snap===91?'selected':''}>910(半マス)</option>
        <option value="455" ${state.snap===455?'selected':''}>455(柱間)</option>
      </select>
    </div>`;
  sp.appendChild(disp);

  // レイヤー
  const ly=document.createElement('div');ly.className='prop-section';
  ly.innerHTML=`<h4>レイヤー</h4><div id="layerList"></div>`;
  sp.appendChild(ly);

  rebindPaletteHandlers();
  buildLayerPanel();
  updateSelectionPanel();
}

function rebindPaletteHandlers(){
  document.querySelectorAll('.tool-btn').forEach(b=>{
    if(b.dataset.tool) b.onclick=()=>selectTool(b.dataset.tool);
  });
  document.querySelectorAll('.cond-btn').forEach(b=>{
    if(parseInt(b.dataset.c)===state.conductors) b.classList.add('active');
    b.onclick=()=>{
      document.querySelectorAll('.cond-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      state.conductors=parseInt(b.dataset.c);
      if(state.selected.size){
        pushHistory();
        for(const id of state.selected){
          const w=state.wires.find(w=>w.id===id);
          if(w) w.conductors=state.conductors;
        }
        updateSelectionPanel();render();
      }
    };
  });
  const cn=document.getElementById('circuitNum');
  if(cn){
    cn.value=state.circuitNum||'';
    cn.onchange=e=>{state.circuitNum=e.target.value.trim();};
  }
  const om=document.getElementById('orthoMode');
  if(om){om.value=state.orthoMode||'H';om.onchange=e=>{state.orthoMode=e.target.value;};}
  const ss=document.getElementById('symSize');
  if(ss) ss.onchange=e=>{state.symSize=parseFloat(e.target.value)||200;render();};
  const sn=document.getElementById('snapSize');
  if(sn) sn.onchange=e=>{state.snap=parseFloat(e.target.value)||0;render();};
  const e1=document.getElementById('btnExportDxf2');if(e1) e1.onclick=()=>document.getElementById('btnExportDxf').click();
  const e2=document.getElementById('btnExportPdf2');if(e2) e2.onclick=()=>document.getElementById('btnExportPdf').click();
  const e3=document.getElementById('btnExportPng2');if(e3) e3.onclick=()=>document.getElementById('btnExportPng').click();
  // 背景画像コントロール
  const bgW=document.getElementById('bgW');if(bgW) bgW.oninput=e=>{
    if(!state.bgImage) return;
    const v=parseFloat(e.target.value)||state.bgImage.w;
    const aspect=state.bgImage.h/state.bgImage.w;
    state.bgImage.w=v;
    if(e.target.dataset.lockAspect!=='off') state.bgImage.h=v*aspect;
    const bgH=document.getElementById('bgH');if(bgH) bgH.value=Math.round(state.bgImage.h);
    render();
  };
  const bgH=document.getElementById('bgH');if(bgH) bgH.oninput=e=>{
    if(!state.bgImage) return;
    state.bgImage.h=parseFloat(e.target.value)||state.bgImage.h;render();
  };
  const bgX=document.getElementById('bgX');if(bgX) bgX.oninput=e=>{
    if(!state.bgImage) return;
    state.bgImage.x=parseFloat(e.target.value)||0;render();
  };
  const bgY=document.getElementById('bgY');if(bgY) bgY.oninput=e=>{
    if(!state.bgImage) return;
    state.bgImage.y=parseFloat(e.target.value)||0;render();
  };
  const bgOpa=document.getElementById('bgOpa');if(bgOpa) bgOpa.oninput=e=>{
    if(!state.bgImage) return;
    state.bgImage.opacity=parseFloat(e.target.value);render();
  };
  const bgFit=document.getElementById('btnBgFit');if(bgFit) bgFit.onclick=()=>fitView();
  const bgClr=document.getElementById('btnBgClear');if(bgClr) bgClr.onclick=()=>{
    pushHistory();state.bgImage=null;buildLayerPanel();buildSubpalette();render();
    toast('背景を削除しました');
  };
}

function selectCategory(catId){
  activeCategory=catId;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.toggle('active',b.dataset.cat===catId));
  buildSubpalette();
}

// 互換: buildSidebar() 既存呼び出しを buildSubpalette に転送
function buildSidebar(){ buildSubpalette(); }

function buildLayerPanel(){
  const list=document.getElementById('layerList');
  list.innerHTML='';
  for(const lkey in LAYERS){
    const l=LAYERS[lkey];
    const count=lkey==='BG'?state.bgEntities.length:
      lkey==='E-WIRE'?state.wires.length:
      lkey==='E-TEXT'?state.texts.length:
      lkey==='E-HOME'?state.homeruns.length:
      state.symbols.filter(s=>SYMBOLS[s.type]?.layer===lkey).length;
    const row=document.createElement('div');
    row.className='layer-row'+(l.visible?'':' hidden');
    row.innerHTML=`<span style="font-size:10px;width:14px;color:var(--ink-soft)">${l.visible?'●':'○'}</span>
      <span class="swatch" style="background:${l.color}"></span>
      <span class="name">${l.name}</span>
      <span class="count">${count}</span>`;
    row.onclick=()=>{l.visible=!l.visible;buildLayerPanel();render();};
    list.appendChild(row);
  }
}

function selectTool(t){
  state.tool=t;
  state.drawingWire=null;
  document.querySelectorAll('.sym-btn').forEach(b=>b.classList.toggle('active',b.dataset.sym===t));
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
  const h=document.getElementById('tool-hint');
  if(SYMBOLS[t]){ h.innerHTML='記号: <b>'+SYMBOLS[t].name+'</b> — クリックで配置 / Rで回転 / Escで解除'; h.classList.add('show'); }
  else if(t==='wire'){ h.innerHTML='<b>配線(実線)</b> — クリックで頂点追加 / Tabで直交方向切替 / 右クリック・Escで確定'; h.classList.add('show'); }
  else if(t==='wire-dash'){ h.innerHTML='<b>隠蔽配線(破線)</b> — クリックで頂点追加 / Tabで直交方向切替 / 右クリック・Escで確定'; h.classList.add('show'); }
  else if(t==='homerun'){ h.innerHTML='<b>引込(ホームラン)</b> — クリックで配置 / Rで回転'; h.classList.add('show'); }
  else if(t==='text'){ h.innerHTML='<b>文字注記</b> — クリック位置に文字を入力'; h.classList.add('show'); }
  else { h.classList.remove('show'); }
  document.getElementById('stage').classList.toggle('pan',t==='pan');
  render();
}
