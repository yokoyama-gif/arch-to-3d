<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>外構予算積算ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;height:100vh;overflow:hidden;user-select:none}
#sidebar{width:320px;min-width:320px;background:#16213e;display:flex;flex-direction:column;border-right:1px solid #0f3460;overflow:hidden}
#sidebar h2{padding:12px 16px 8px;font-size:15px;color:#4a9eff;border-bottom:1px solid #0f3460}
.tabs{display:flex;border-bottom:1px solid #0f3460}
.tab{flex:1;padding:10px 4px;text-align:center;cursor:pointer;font-size:12px;background:#16213e;color:#8899aa;border:none;border-bottom:2px solid transparent;transition:.2s}
.tab:hover{color:#e0e0e0}
.tab.active{color:#4a9eff;border-bottom-color:#4a9eff;background:#1a1a3e}
.tab-content{display:none;flex:1;overflow-y:auto;padding:12px}
.tab-content.active{display:flex;flex-direction:column;gap:8px}
label{font-size:12px;color:#8899aa;margin-bottom:2px}
input[type=file]{display:none}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;text-align:center;transition:.2s}
.btn-primary{background:#4a9eff;color:#fff}.btn-primary:hover{background:#3a8eef}
.btn-success{background:#3ecf6e;color:#fff}.btn-success:hover{background:#2ebf5e}
.btn-danger{background:#ff4d5a;color:#fff}.btn-danger:hover{background:#ef3d4a}
.btn-warn{background:#ffa33e;color:#fff}.btn-warn:hover{background:#ef932e}
.btn-sm{padding:5px 8px;font-size:11px}
.btn:disabled{opacity:.4;cursor:default}
.btn-outline{background:transparent;border:1px solid #4a9eff;color:#4a9eff}
.btn-outline:hover{background:#4a9eff22}
input[type=number],input[type=text],select{width:100%;padding:6px 8px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:12px}
input[type=number]:focus,input[type=text]:focus{outline:none;border-color:#4a9eff}
.row{display:flex;gap:6px;align-items:center}.row>*{flex:1}
.info-box{background:#0f3460;border-radius:6px;padding:8px 10px;font-size:12px}
.item-card{background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;padding:8px;font-size:12px;cursor:pointer;transition:.2s}
.item-card:hover{border-color:#4a9eff}
.item-card.selected{border-color:#4a9eff;box-shadow:0 0 6px #4a9eff44}
.item-card .item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.item-card .item-name{font-weight:bold;display:flex;align-items:center;gap:4px}
.item-card .item-color{width:12px;height:12px;border-radius:50%;display:inline-block}
.item-card .item-detail{color:#8899aa}
.item-card .item-price{color:#3ecf6e;font-weight:bold}
.type-selector{display:flex;flex-direction:column;gap:4px}
.type-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid #0f3460;border-radius:4px;cursor:pointer;font-size:12px;transition:.2s}
.type-option:hover{border-color:#4a9eff}
.type-option.selected{border-color:#4a9eff;background:#4a9eff22}
.type-option .swatch{width:20px;height:20px;border-radius:4px}
.estimate-table{width:100%;border-collapse:collapse;font-size:11px}
.estimate-table th{background:#0f3460;padding:6px 4px;text-align:left;position:sticky;top:0}
.estimate-table td{padding:5px 4px;border-bottom:1px solid #0f346044}
.estimate-table .num{text-align:right}
.estimate-table input{width:70px;text-align:right;padding:2px 4px}
.total-row{font-weight:bold;color:#3ecf6e;font-size:13px}
.grand-total{background:#0f3460;border-radius:6px;padding:12px;text-align:center;font-size:18px;font-weight:bold;color:#3ecf6e}
#canvas-area{flex:1;position:relative;overflow:hidden;background:#111}
canvas{position:absolute;top:0;left:0}
.hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#000a;color:#fff;padding:6px 14px;border-radius:16px;font-size:12px;pointer-events:none;white-space:nowrap;z-index:10}
.context-menu{position:fixed;background:#16213e;border:1px solid #0f3460;border-radius:6px;padding:4px 0;z-index:100;min-width:140px;box-shadow:0 4px 16px #000a}
.context-menu div{padding:8px 16px;font-size:12px;cursor:pointer;transition:.15s}
.context-menu div:hover{background:#4a9eff33}
#drawing-indicator{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#ff4d5a;color:#fff;padding:6px 16px;border-radius:16px;font-size:12px;font-weight:bold;z-index:10;display:none}
</style>
</head>
<body>
<div id="sidebar">
<h2>外構予算積算ツール</h2>
<div class="tabs">
<button class="tab active" data-tab="tab-basic">基本</button>
<button class="tab" data-tab="tab-area">面積</button>
<button class="tab" data-tab="tab-line">線</button>
<button class="tab" data-tab="tab-estimate">積算</button>
</div>
<div id="tab-basic" class="tab-content active">
<label>PDF / 画像を読み込み</label>
<label class="btn btn-primary" style="display:block">ファイルを選択<input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.webp"></label>
<div id="pageNav" style="display:none"><div class="row"><button class="btn btn-sm btn-outline" id="prevPage">◀</button><span id="pageInfo" style="text-align:center;font-size:12px">1/1</span><button class="btn btn-sm btn-outline" id="nextPage">▶</button></div></div>
<hr style="border-color:#0f3460">
<label>敷地設定</label>
<button class="btn btn-primary" id="startSite" style="width:100%">敷地頂点をクリック</button>
<button class="btn btn-success" id="confirmSite" style="width:100%;display:none">敷地を確定</button>
<button class="btn btn-danger btn-sm" id="resetSite" style="width:100%;display:none">敷地リセット</button>
<div id="siteInfo" style="display:none">
<div class="info-box"><div>敷地頂点: <span id="siteVertexCount">0</span> 点</div></div>
<label>実面積 (㎡)</label>
<input type="number" id="realArea" placeholder="例: 150" step="0.01" min="0">
<div class="info-box" id="scaleInfo" style="display:none"><div>スケール: <span id="scaleVal">-</span> px/m</div></div>
</div>
<hr style="border-color:#0f3460">
<div class="row"><button class="btn btn-sm btn-outline" id="undoBtn" disabled>↩ 戻す</button><button class="btn btn-sm btn-outline" id="redoBtn" disabled>↪ やり直し</button></div>
<button class="btn btn-success" id="downloadBtn" style="width:100%">積算付き画像DL</button>
<button class="btn btn-outline" id="csvBtn" style="width:100%">CSV出力</button>
</div>
<div id="tab-area" class="tab-content">
<label>アイテムタイプ</label>
<div class="type-selector" id="areaTypeSelector"></div>
<div class="row" style="margin-top:4px"><button class="btn btn-primary" id="startAreaDraw" style="flex:2" disabled>描画開始</button><button class="btn btn-success" id="confirmAreaDraw" style="flex:1;display:none">確定</button><button class="btn btn-danger btn-sm" id="cancelAreaDraw" style="flex:1;display:none">取消</button></div>
<hr style="border-color:#0f3460">
<label>面積アイテム一覧</label>
<div id="areaItemList"></div>
</div>
<div id="tab-line" class="tab-content">
<label>アイテムタイプ</label>
<div class="type-selector" id="lineTypeSelector"></div>
<div class="row" style="margin-top:4px"><button class="btn btn-primary" id="startLineDraw" style="flex:2" disabled>描画開始</button><button class="btn btn-success" id="confirmLineDraw" style="flex:1;display:none">確定</button><button class="btn btn-danger btn-sm" id="cancelLineDraw" style="flex:1;display:none">取消</button></div>
<hr style="border-color:#0f3460">
<label>線アイテム一覧</label>
<div id="lineItemList"></div>
</div>
<div id="tab-estimate" class="tab-content">
<div class="grand-total">合計: ¥<span id="grandTotal">0</span></div>
<hr style="border-color:#0f3460">
<label>面積系</label>
<div style="overflow-x:auto"><table class="estimate-table" id="areaEstTable"><thead><tr><th>タイプ</th><th>面積</th><th>単価</th><th>小計</th></tr></thead><tbody></tbody></table></div>
<div class="info-box"><span class="total-row">面積系 小計: ¥<span id="areaTotalVal">0</span></span></div>
<hr style="border-color:#0f3460">
<label>線系</label>
<div style="overflow-x:auto"><table class="estimate-table" id="lineEstTable"><thead><tr><th>タイプ</th><th>長さ</th><th>単価</th><th>小計</th></tr></thead><tbody></tbody></table></div>
<div class="info-box"><span class="total-row">線系 小計: ¥<span id="lineTotalVal">0</span></span></div>
</div>
</div>
<div id="canvas-area">
<canvas id="canvas"></canvas>
<div id="drawing-indicator">描画中...</div>
<div class="hint" id="hint" style="display:none"></div>
</div>
<script>
(function(){'use strict';
var AREA_TYPES=[{id:'doma',label:'\u571F\u9593\u30B3\u30F3',color:'#808080',unitPrice:12000,unit:'\u33A1'},{id:'porch',label:'\u30DD\u30FC\u30C1(\u30BF\u30A4\u30EB)',color:'#D2691E',unitPrice:18000,unit:'\u33A1'},{id:'gravel',label:'\u7802\u5229\u6577\u304D',color:'#DAA520',unitPrice:3000,unit:'\u33A1'},{id:'lawn',label:'\u829D\u751F',color:'#3ecf6e',unitPrice:5000,unit:'\u33A1'},{id:'asphalt',label:'\u30A2\u30B9\u30D5\u30A1\u30EB\u30C8',color:'#555555',unitPrice:8000,unit:'\u33A1'}];
var LINE_TYPES=[{id:'block',label:'\u30D6\u30ED\u30C3\u30AF\u5840',color:'#ff4d5a',unitPrice:15000,unit:'m'},{id:'fence',label:'\u30D5\u30A7\u30F3\u30B9',color:'#4a9eff',unitPrice:12000,unit:'m'},{id:'boundary',label:'\u5883\u754C\u30D6\u30ED\u30C3\u30AF',color:'#ffa33e',unitPrice:8000,unit:'m'},{id:'uditch',label:'U\u5B57\u6E9D',color:'#e85aff',unitPrice:6000,unit:'m'}];
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),canvasArea=document.getElementById('canvas-area');
var bgImage=null,pdfDoc=null,currentPage=1,viewX=0,viewY=0,viewScale=1;
var siteVertices=[],siteConfirmed=false,realAreaInput=document.getElementById('realArea');
var areaItems=[],lineItems=[],nextItemId=1,selectedAreaType=null,selectedLineType=null,selectedItem=null;
var mode='none',drawingPoints=[],undoStack=[],redoStack=[];
var dragging=false,dragStart={x:0,y:0},viewStart={x:0,y:0},vertexDrag=null,itemDrag=null,ctxMenu=null;
var hintEl=document.getElementById('hint'),drawingIndicator=document.getElementById('drawing-indicator');
var pinchDist=0,pinchCenter={x:0,y:0};
function stw(sx,sy){return{x:(sx-viewX)/viewScale,y:(sy-viewY)/viewScale}}
function wts(wx,wy){return{x:wx*viewScale+viewX,y:wy*viewScale+viewY}}
function calcPA(pts){var n=pts.length;if(n<3)return 0;var a=0;for(var i=0;i<n;i++){var j=(i+1)%n;a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}return Math.abs(a)/2;}
function plLen(pts){var len=0;for(var i=1;i<pts.length;i++){var dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;len+=Math.sqrt(dx*dx+dy*dy);}return len;}
function ppm(){if(!siteConfirmed||siteVertices.length<3)return 0;var ra=parseFloat(realAreaInput.value);if(!ra||ra<=0)return 0;var pa=calcPA(siteVertices);if(pa<=0)return 0;return Math.sqrt(pa/ra);}
function px2m(px){var p=ppm();return p>0?px/p:0;}
function px2m2(pxA){var p=ppm();return p>0?pxA/(p*p):0;}
function pip(pt,poly){var x=pt.x,y=pt.y,n=poly.length,ins=false;for(var i=0,j=n-1;i<n;j=i++){var xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))ins=!ins;}return ins;}
function d2s(p,a,b){var dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(p.x-a.x,p.y-a.y);var t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/l2));return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));}
function npl(pt,pts,th){for(var i=1;i<pts.length;i++){if(d2s(pt,pts[i-1],pts[i])<th)return true;}return false;}
function ctr(pts){var cx=0,cy=0;pts.forEach(function(p){cx+=p.x;cy+=p.y;});return{x:cx/pts.length,y:cy/pts.length};}
function mpt(pts){if(pts.length<2)return pts[0]||{x:0,y:0};var tl=plLen(pts),h=tl/2,a=0;for(var i=1;i<pts.length;i++){var dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y,s=Math.hypot(dx,dy);if(a+s>=h){var t=(h-a)/s;return{x:pts[i-1].x+dx*t,y:pts[i-1].y+dy*t};}a+=s;}return pts[pts.length-1];}
function fmt(n){return n.toLocaleString('ja-JP');}
function saveState(){undoStack.push(JSON.stringify({sv:siteVertices,sc:siteConfirmed,ai:areaItems,li:lineItems,ni:nextItemId}));if(undoStack.length>50)undoStack.shift();redoStack=[];updUB();}
function _rs(s){siteVertices=s.sv;siteConfirmed=s.sc;areaItems=s.ai;lineItems=s.li;nextItemId=s.ni;updUB();updSU();updAL();updLL();updEst();draw();}
function undo(){if(!undoStack.length)return;redoStack.push(JSON.stringify({sv:siteVertices,sc:siteConfirmed,ai:areaItems,li:lineItems,ni:nextItemId}));_rs(JSON.parse(undoStack.pop()));}
function redo(){if(!redoStack.length)return;undoStack.push(JSON.stringify({sv:siteVertices,sc:siteConfirmed,ai:areaItems,li:lineItems,ni:nextItemId}));_rs(JSON.parse(redoStack.pop()));}
function updUB(){document.getElementById('undoBtn').disabled=!undoStack.length;document.getElementById('redoBtn').disabled=!redoStack.length;}
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
document.getElementById('fileInput').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;if(f.type==='application/pdf'){var r=new FileReader();r.onload=function(ev){pdfjsLib.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){pdfDoc=pdf;currentPage=1;rdrPg();document.getElementById('pageNav').style.display=pdf.numPages>1?'':'none';uPI();});};r.readAsArrayBuffer(f);}else{var img=new Image();img.onload=function(){bgImage=img;pdfDoc=null;fitV();draw();document.getElementById('pageNav').style.display='none';};img.src=URL.createObjectURL(f);}});
function rdrPg(){if(!pdfDoc)return;pdfDoc.getPage(currentPage).then(function(pg){var vp=pg.getViewport({scale:2});var c2=document.createElement('canvas');c2.width=vp.width;c2.height=vp.height;pg.render({canvasContext:c2.getContext('2d'),viewport:vp}).promise.then(function(){var img=new Image();img.onload=function(){bgImage=img;fitV();draw();};img.src=c2.toDataURL();});});}
function uPI(){if(pdfDoc)document.getElementById('pageInfo').textContent=currentPage+'/'+pdfDoc.numPages;}
document.getElementById('prevPage').onclick=function(){if(pdfDoc&&currentPage>1){currentPage--;rdrPg();uPI();}};
document.getElementById('nextPage').onclick=function(){if(pdfDoc&&currentPage<pdfDoc.numPages){currentPage++;rdrPg();uPI();}};
function fitV(){if(!bgImage)return;var cw=canvasArea.clientWidth,ch=canvasArea.clientHeight;var s=Math.min(cw/bgImage.width,ch/bgImage.height)*.95;viewScale=s;viewX=(cw-bgImage.width*s)/2;viewY=(ch-bgImage.height*s)/2;}
function rsz(){canvas.width=canvasArea.clientWidth;canvas.height=canvasArea.clientHeight;draw();}
window.addEventListener('resize',rsz);setTimeout(rsz,50);
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active');};});
function bSel(types,cid,cb){var c=document.getElementById(cid);types.forEach(function(t){var d=document.createElement('div');d.className='type-option';d.innerHTML='<div class="swatch" style="background:'+t.color+'"></div><div><div>'+t.label+'</div><div style="font-size:10px;color:#8899aa">\u00A5'+fmt(t.unitPrice)+'/'+t.unit+'</div></div>';d.onclick=function(){c.querySelectorAll('.type-option').forEach(function(x){x.classList.remove('selected');});d.classList.add('selected');cb(t);};c.appendChild(d);});}
bSel(AREA_TYPES,'areaTypeSelector',function(t){selectedAreaType=t;document.getElementById('startAreaDraw').disabled=false;});
bSel(LINE_TYPES,'lineTypeSelector',function(t){selectedLineType=t;document.getElementById('startLineDraw').disabled=false;});
document.getElementById('startSite').onclick=function(){if(siteConfirmed)return;mode='site';drawingPoints=siteVertices.slice();showH('\u30AF\u30EA\u30C3\u30AF\u3067\u6577\u5730\u9802\u70B9\u3092\u8FFD\u52A0');document.getElementById('confirmSite').style.display='';document.getElementById('startSite').style.display='none';};
document.getElementById('confirmSite').onclick=function(){if(drawingPoints.length<3){alert('3\u70B9\u4EE5\u4E0A\u5FC5\u8981\u3067\u3059');return;}saveState();siteVertices=drawingPoints.slice();siteConfirmed=true;mode='none';drawingPoints=[];hideH();updSU();draw();};
document.getElementById('resetSite').onclick=function(){saveState();siteVertices=[];siteConfirmed=false;mode='none';drawingPoints=[];hideH();updSU();draw();};
realAreaInput.oninput=function(){updSc();updEst();draw();};
function updSU(){document.getElementById('siteInfo').style.display=siteVertices.length>0?'':'none';document.getElementById('siteVertexCount').textContent=siteVertices.length;document.getElementById('startSite').style.display=siteConfirmed?'none':'';document.getElementById('confirmSite').style.display='none';document.getElementById('resetSite').style.display=siteConfirmed?'':'none';updSc();}
function updSc(){var p=ppm();var el=document.getElementById('scaleInfo');if(p>0){el.style.display='';document.getElementById('scaleVal').textContent=p.toFixed(2);}else el.style.display='none';}
document.getElementById('startAreaDraw').onclick=function(){if(!selectedAreaType||!siteConfirmed){alert('\u6577\u5730\u3092\u5148\u306B\u78BA\u5B9A\u3057\u3066\u304F\u3060\u3055\u3044');return;}mode='area-draw';drawingPoints=[];showH('\u30AF\u30EA\u30C3\u30AF\u3067\u9802\u70B9\u8FFD\u52A0');drawingIndicator.textContent='\u9762\u7A4D\u63CF\u753B\u4E2D: '+selectedAreaType.label;drawingIndicator.style.display='';document.getElementById('confirmAreaDraw').style.display='';document.getElementById('cancelAreaDraw').style.display='';document.getElementById('startAreaDraw').style.display='none';};
document.getElementById('confirmAreaDraw').onclick=function(){if(drawingPoints.length<3)return;finA();};
document.getElementById('cancelAreaDraw').onclick=function(){canDr();};
function finA(){saveState();var t=selectedAreaType;areaItems.push({id:nextItemId++,typeId:t.id,label:t.label,color:t.color,unitPrice:t.unitPrice,unit:t.unit,points:drawingPoints.slice()});drawingPoints=[];mode='none';hideH();drawingIndicator.style.display='none';document.getElementById('confirmAreaDraw').style.display='none';document.getElementById('cancelAreaDraw').style.display='none';document.getElementById('startAreaDraw').style.display='';updAL();updEst();draw();}
document.getElementById('startLineDraw').onclick=function(){if(!selectedLineType||!siteConfirmed){alert('\u6577\u5730\u3092\u5148\u306B\u78BA\u5B9A');return;}mode='line-draw';drawingPoints=[];showH('\u30AF\u30EA\u30C3\u30AF\u3067\u70B9\u8FFD\u52A0');drawingIndicator.textContent='\u7DDA\u63CF\u753B\u4E2D: '+selectedLineType.label;drawingIndicator.style.display='';document.getElementById('confirmLineDraw').style.display='';document.getElementById('cancelLineDraw').style.display='';document.getElementById('startLineDraw').style.display='none';};
document.getElementById('confirmLineDraw').onclick=function(){if(drawingPoints.length<2)return;finL();};
document.getElementById('cancelLineDraw').onclick=function(){canDr();};
function finL(){saveState();var t=selectedLineType;lineItems.push({id:nextItemId++,typeId:t.id,label:t.label,color:t.color,unitPrice:t.unitPrice,unit:t.unit,points:drawingPoints.slice()});drawingPoints=[];mode='none';hideH();drawingIndicator.style.display='none';document.getElementById('confirmLineDraw').style.display='none';document.getElementById('cancelLineDraw').style.display='none';document.getElementById('startLineDraw').style.display='';updLL();updEst();draw();}
