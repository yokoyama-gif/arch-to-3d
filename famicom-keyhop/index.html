<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KEYHOP</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="title-block">
        <p class="kicker">One-Screen 8-Bit Action</p>
        <h1>KEYHOP</h1>
      </header>
      <section class="cabinet">
        <canvas
          id="game"
          width="256"
          height="240"
          aria-label="KEYHOP game screen"
        ></canvas>
      </section>
      <section class="panel">
        <p><strong>Move</strong> Arrow Keys or A / D</p>
        <p><strong>Jump</strong> Z, K, W, Up, or Space</p>
        <p><strong>Start</strong> Enter</p>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
