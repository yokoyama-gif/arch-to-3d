<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オセロゲーム</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">BROWSER GAME</p>
        <h1>オセロゲーム</h1>
        <p class="lead">
          黒から開始します。置ける場所にはガイドが表示され、打てない場合は自動でパスします。
        </p>
      </section>

      <section class="layout">
        <aside class="sidebar">
          <div class="panel turn-panel">
            <p class="panel-label">現在の手番</p>
            <div class="turn-indicator">
              <span id="turn-disc" class="turn-disc black"></span>
              <strong id="turn-text">黒の番</strong>
            </div>
            <p id="message" class="message">ゲームを開始しました。</p>
          </div>

          <div class="panel score-panel">
            <p class="panel-label">スコア</p>
            <div class="score-grid">
              <div class="score-card score-card-black">
                <span class="score-name">黒</span>
                <strong id="black-score">2</strong>
              </div>
              <div class="score-card score-card-white">
                <span class="score-name">白</span>
                <strong id="white-score">2</strong>
              </div>
            </div>
            <p id="move-count" class="meta">手数: 0</p>
          </div>

          <div class="panel action-panel">
            <button id="restart-button" class="action-button" type="button">
              最初からやり直す
            </button>
          </div>

          <div class="panel rules-panel">
            <p class="panel-label">ルール</p>
            <ul>
              <li>相手の石を挟める場所にだけ置けます。</li>
              <li>置ける場所がない場合は自動でパスです。</li>
              <li>両者とも置けなくなったら終了です。</li>
            </ul>
          </div>
        </aside>

        <section class="board-panel">
          <div class="board-header">
            <div class="board-title">
              <p class="panel-label">盤面</p>
              <p id="status-text" class="board-status">合法手を選んでください。</p>
            </div>
          </div>

          <div id="board" class="board" aria-label="オセロ盤" role="grid"></div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
